<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME PRO | AI Matching Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #39FF14; --gold: #FFD700; --dark: #050505; --engine-white: #ffffff; }
        
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: white; overflow: hidden; }

        /* FIXED BACKGROUND SYSTEM */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background-color: #111;
            background-image: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&q=80&w=2070'); /* Fallback Image */
            background-size: cover; background-position: center;
        }
        video {
            min-width: 100%; min-height: 100%; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); object-fit: cover; filter: brightness(80%);
        }

        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px 5%; position: relative; z-index: 10; }
        
        h1 { font-family: 'Montserrat'; font-size: clamp(2rem, 6vw, 4rem); text-transform: uppercase; letter-spacing: -2px; margin: 0 0 20px 0; line-height: 0.95; }
        .money { color: var(--gold); text-decoration: underline; }

        /* ENGINE CONTAINER */
        .engine-container { 
            max-width: 700px; width: 100%; background: var(--engine-white); 
            border-radius: 35px; padding: 35px; color: #1a1a1a; text-align: left;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .chat-feed { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .msg { padding: 16px 20px; border-radius: 18px; font-weight: 700; font-size: 0.95rem; line-height: 1.4; max-width: 85%; }
        .ai-msg { background: #f0f0f0; align-self: flex-start; }
        .user-msg { background: var(--gold); align-self: flex-end; }

        .input-row { display: flex; gap: 10px; }
        input { flex: 1; height: 65px; border-radius: 15px; border: 2px solid #eee; padding: 0 20px; font-weight: 800; font-size: 1rem; }
        .send-btn { width: 65px; background: #000; color: white; border: none; border-radius: 15px; cursor: pointer; font-size: 1.5rem; }

        /* LEAD CARD - FORCED VISIBILITY */
        #finalCard { display: none; }
        .lead-card { background: #fafafa; border: 1px solid #eee; border-left: 6px solid var(--gold); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .lead-line { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; font-size: 0.9rem; }
        .lead-line b { font-family: 'Montserrat'; font-size: 0.7rem; text-transform: uppercase; }

        .card-actions { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 20px; border-radius: 15px; border: none; font-family: 'Montserrat'; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .confirm { background: #000; color: white; }
        .edit { background: #eee; color: #666; }
    </style>
</head>
<body>

    <div class="bg-container">
        <video autoplay muted loop playsinline>
            <source src="https://player.vimeo.com/external/434045526.sd.mp4?s=c3a233367a02203e4291888a71f0084f7e6f8090&profile_id=164" type="video/mp4">
        </video>
    </div>

    <section class="hero">
        <h1>STOP WASTING <span class="money">$10,000+</span> ON SHODDY <br>CONTRACTORS WHO GHOST YOU.</h1>

        <div class="engine-container">
            <div id="interface">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <span style="font-weight:900; font-size:0.7rem; color:#999; text-transform:uppercase; letter-spacing:1px;">AI Matching Engine</span>
                    <button onclick="location.reload()" style="background:none; border:none; cursor:pointer; font-weight:bold; font-size:0.7rem;">REFRESH ↻</button>
                </div>
                <div class="chat-feed" id="chatFeed">
                    <div class="msg ai-msg">Simply tell us about your project (e.g., roofing, HVAC, Windows)</div>
                </div>
                <div class="input-row">
                    <input type="text" id="userIn" placeholder="Enter details..." onkeypress="if(event.key==='Enter') process()">
                    <button class="send-btn" onclick="process()">→</button>
                </div>
            </div>

            <div id="finalCard">
                <div style="font-family:'Montserrat'; font-weight:900; margin-bottom:15px; text-transform:uppercase; font-size:0.8rem;">Verify Your Project Details</div>
                <div class="lead-card">
                    <div class="lead-line"><b>Project</b> <span id="l_project"></span></div>
                    <div class="lead-line"><b>Scale</b> <span id="l_scale"></span></div>
                    <div class="lead-line"><b>Name</b> <span id="l_name"></span></div>
                    <div class="lead-line"><b>Market</b> <span id="l_location"></span></div>
                    <div class="lead-line"><b>Contact</b> <span id="l_phone"></span></div>
                    <div class="lead-line"><b>Window</b> <span id="l_time"></span></div>
                </div>
                <div class="card-actions">
                    <button class="btn edit" onclick="location.reload()">Edit</button>
                    <button class="btn confirm" onclick="alert('Lead Verified. Matching you now.')">Confirm</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        const CLOUDFLARE_URL = "https://vvhomepro-brain.dbelnavis.workers.dev/";
        let chatHistory = [];
        let leadData = { project: '', scale: '', name: '', location: '', phone: '', time: '' };
        let step = 0;

        function addMsg(txt, type) {
            const feed = document.getElementById('chatFeed');
            const div = document.createElement('div');
            div.className = `msg ${type}-msg`;
            div.innerText = txt;
            feed.appendChild(div);
            feed.scrollTop = feed.scrollHeight;
        }

        async function process() {
            const input = document.getElementById('userIn');
            const val = input.value.trim();
            if(!val) return;

            addMsg(val, 'user');
            input.value = "";

            // Capture data turn-by-turn
            if(step === 0) leadData.project = val;
            else if(step === 1) leadData.scale = val;
            else if(step === 2) leadData.name = val;
            else if(step === 3) leadData.location = val;
            else if(step === 4) leadData.phone = val;
            else if(step === 5) leadData.time = val;

            try {
                const res = await fetch(CLOUDFLARE_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: val, history: chatHistory })
                });
                const data = await res.json();
                const aiText = data.text;
                addMsg(aiText, 'ai-msg');

                chatHistory.push({ role: "user", content: val });
                chatHistory.push({ role: "assistant", content: aiText });

                // TRIGGER CHECK: If AI sent the final "top-tier" message OR we hit step 6
                if(aiText.includes("top-tier") || aiText.includes("shortly") || step >= 5) {
                    setTimeout(triggerLeadCard, 1500);
                }
                step++;
            } catch (e) {
                addMsg("Connection Error. Refresh and try again.", 'ai-msg');
            }
        }

        function triggerLeadCard() {
            document.getElementById('interface').style.display = 'none';
            document.getElementById('l_project').innerText = leadData.project || "N/A";
            document.getElementById('l_scale').innerText = leadData.scale || "N/A";
            document.getElementById('l_name').innerText = leadData.name || "N/A";
            document.getElementById('l_location').innerText = leadData.location || "N/A";
            document.getElementById('l_phone').innerText = leadData.phone || "N/A";
            document.getElementById('l_time').innerText = leadData.time || "N/A";
            document.getElementById('finalCard').style.display = 'block';
        }
    </script>
</body>
</html>
