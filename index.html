<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME | AI Matchmaking Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #001a33; --gold: #c5a059; --neon: #39FF14; --card-bg: rgba(255, 255, 255, 0.92); }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f4f4; color: #000; overflow-x: hidden; }

        /* VIDEO BACKGROUND */
        .video-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .video-wrapper video { min-width: 100%; min-height: 100%; width: auto; height: auto; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); object-fit: cover; filter: brightness(90%); }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.4) 100%); }

        .hero-content { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 60px 5%; }

        h1 { font-family: 'Montserrat'; font-size: clamp(2rem, 7vw, 4.5rem); text-transform: uppercase; letter-spacing: -2px; line-height: 0.95; margin: 0 0 30px 0; color: var(--navy); }
        h1 span { color: var(--gold); }

        /* THE LIVE AI ENGINE CARD */
        .engine-card {
            background: var(--card-bg); padding: 45px; border-radius: 40px; 
            width: 100%; max-width: 550px; border: 3px solid var(--navy);
            box-shadow: 0 30px 60px rgba(0,0,0,0.15); position: relative; overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* Scan Line Effect */
        .engine-card::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--neon); box-shadow: 0 0 15px var(--neon);
            animation: scanLoop 4s infinite linear;
        }
        @keyframes scanLoop { 0% { top: 0%; } 100% { top: 100%; } }

        .engine-label { color: var(--navy); font-family: 'Montserrat'; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; font-weight: 900; opacity: 0.7; }

        /* ENGINE INPUTS */
        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--navy); margin-left: 5px; }
        
        select, input {
            width: 100%; height: 65px; border-radius: 12px; border: 2px solid #ddd;
            margin-top: 5px; padding: 0 20px; font-family: 'Plus Jakarta Sans';
            font-size: 1.1rem; font-weight: 700; color: var(--navy); outline: none;
            background: white; transition: 0.3s;
        }
        select:focus, input:focus { border-color: var(--gold); }

        .btn-match {
            display: block; width: 100%; padding: 22px; background: var(--navy);
            color: #fff; text-decoration: none; font-family: 'Montserrat';
            font-weight: 900; font-size: 1.2rem; border-radius: 12px;
            text-transform: uppercase; transition: 0.3s; margin-top: 10px; border: none; cursor: pointer;
        }
        .btn-match:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,26,51,0.4); background: #002a52; }

        /* NAVIGATION BUBBLES */
        .legal-bubbles { display: flex; justify-content: center; gap: 10px; margin-top: 40px; flex-wrap: wrap; }
        .bubble { padding: 10px 18px; border-radius: 50px; background: var(--navy); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #fff; cursor: pointer; text-decoration: none; border: 1px solid var(--navy); transition: 0.3s; }
        .bubble:hover { background: var(--gold); border-color: var(--gold); }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(10px); padding: 20px; }
        .modal-content { background: #fff; border: 4px solid var(--navy); padding: 40px; border-radius: 30px; max-width: 700px; width: 100%; max-height: 80vh; overflow-y: auto; position: relative; text-align: left; }
        .close-modal { position: absolute; top: 20px; right: 20px; color: var(--navy); font-size: 2.5rem; cursor: pointer; font-weight: 900; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline poster="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&q=80&w=2070">
            <source src="https://player.vimeo.com/external/459389137.sd.mp4?s=910243615456b9432608c0f56a02f306d87e07a3&profile_id=164&oauth2_token_id=57447761" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <section class="hero-content">
        <h1>Vetted. Verified. <span>Matched.</span></h1>
        
        <div class="engine-card">
            <div class="engine-label">AI Matchmaking Infrastructure v1.0</div>
            
            <div class="input-group">
                <label>Select Project Type</label>
                <select id="trade-select">
                    <option>Roofing Restoration</option>
                    <option>HVAC / Climate Control</option>
                    <option>Window Systems</option>
                    <option>Exterior Maintenance</option>
                </select>
            </div>

            <div class="input-group">
                <label>Service Area (Zip Code)</label>
                <input type="text" placeholder="e.g. 02108" maxlength="5">
            </div>

            <button class="btn-match" onclick="simulateMatch()">Find My Verified Match</button>
        </div>

        <div class="legal-bubbles">
            <a href="why-choose-vv-pro.html" class="bubble">Vetting Standards</a>
            <div class="bubble" onclick="openModal('privacy')">Privacy</div>
            <div class="bubble" onclick="openModal('terms')">Terms</div>
            <a href="pro.html" class="bubble" style="background: var(--gold); border-color: var(--gold); color: #000;">Pro Entrance</a>
        </div>
    </section>

    <div id="modal-overlay" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modal-text"></div>
        </div>
    </div>

    <script>
        function simulateMatch() {
            const btn = document.querySelector('.btn-match');
            btn.innerHTML = "SCANNING REGISTRY...";
            btn.style.background = "#39FF14";
            btn.style.color = "#000";
            setTimeout(() => {
                alert("Match found! Routing to secure project scope form...");
                // In production, this would redirect to your lead capture form
            }, 1500);
        }

        const modalData = {
            privacy: "<h2>Privacy Protocol</h2><p>Our infrastructure uses bank-level encryption. Your home details are only released to the single verified professional matched to your project.</p>",
            terms: "<h2>Standard Terms</h2><p>VV HOME PRO matches you with elite contractors who have cleared our verified auditing process. This service is complimentary for homeowners.</p>"
        };

        function openModal(type) {
            document.getElementById('modal-text').innerHTML = modalData[type];
            document.getElementById('modal-overlay').style.display = 'flex';
        }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    </script>
</body>
</html>
