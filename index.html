<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME | Premium Matchmaking Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy: #001a33; 
            --gold: #c5a059; 
            --neon: #39FF14; 
            --white: #ffffff;
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--navy);
            overflow-x: hidden;
        }

        /* BACKGROUND IMAGE: HIGH-END CONSTRUCTION */
        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 26, 51, 0.7), rgba(0, 26, 51, 0.9)), 
                        url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* TOP NAV: LOGO & BRANDING */
        .header-nav {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 40px; display: flex; align-items: center; gap: 20px;
            z-index: 100;
        }

        /* LOGO BOX - FIXED ASPECT RATIO */
        .brand-logo { 
            width: 85px; height: auto; display: block;
            border: 4px solid var(--white);
            box-shadow: 6px 6px 0px var(--navy);
            background: #fff;
        }

        .brand-text {
            font-family: 'Montserrat'; color: var(--white);
            font-size: 2.2rem; line-height: 0.85; text-transform: uppercase;
            letter-spacing: -2px; text-shadow: 4px 4px 0px var(--navy);
        }

        .main-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding: 150px 20px 80px 20px;
        }

        /* HIGH-IMPACT CALL TO ACTION */
        .cta-section {
            text-align: center; margin-bottom: 50px; max-width: 1000px;
        }
        .cta-section h1 {
            font-family: 'Montserrat'; color: var(--white); font-size: 3.5rem;
            text-transform: uppercase; line-height: 0.95; margin: 0;
            text-shadow: 6px 6px 0px var(--gold);
        }
        .cta-section .neon-text { color: var(--neon); }

        /* THE AI ENGINE - MODELED AFTER PRO.HTML */
        .engine-ui {
            width: 100%; max-width: 650px;
            background: var(--white);
            border: 12px solid var(--navy);
            box-shadow: 40px 40px 0px var(--gold);
            display: flex; flex-direction: column;
        }

        .engine-header {
            background: var(--navy); color: var(--white); padding: 25px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 6px solid var(--gold);
        }
        .engine-header h2 { 
            margin: 0; font-family: 'Montserrat'; font-size: 1.4rem; 
            letter-spacing: 2px; text-transform: uppercase;
        }
        
        .refresh-btn {
            background: var(--neon); color: var(--navy); border: none;
            padding: 12px 24px; font-family: 'Montserrat'; font-weight: 900;
            text-transform: uppercase; cursor: pointer; font-size: 0.8rem;
        }

        /* CHAT FEED - INDUSTRIAL WEIGHT */
        .chat-feed {
            height: 420px; overflow-y: auto; padding: 35px;
            background: #f1f3f5; display: flex; flex-direction: column; gap: 25px;
        }

        .bubble { 
            max-width: 85%; padding: 22px; font-size: 1.1rem; line-height: 1.4;
            font-weight: 800; border: 5px solid var(--navy);
            text-transform: uppercase;
        }
        .ai-msg { 
            align-self: flex-start; background: var(--white); color: var(--navy); 
            box-shadow: 10px 10px 0px var(--gold); 
        }
        .user-msg { 
            align-self: flex-end; background: var(--navy); color: var(--white); 
            box-shadow: -10px 10px 0px var(--neon); 
        }

        /* INPUT AREA */
        .input-bar { 
            padding: 30px; display: flex; gap: 15px; 
            background: var(--white); border-top: 10px solid var(--navy);
        }
        input { 
            flex: 1; border: 6px solid var(--navy); padding: 20px; 
            font-size: 1.2rem; font-weight: 900; outline: none; 
            text-transform: uppercase; font-family: 'Plus Jakarta Sans';
        }
        .send-btn { 
            background: var(--navy); color: var(--neon); border: none; 
            width: 85px; cursor: pointer; font-size: 2.5rem; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
        }

        /* FINAL MATCH CARD */
        #finalResult { display: none; padding: 40px; background: var(--white); }
        .data-summary { 
            background: var(--navy); color: #fff; padding: 30px; 
            border: 8px solid var(--neon); 
        }
        .summary-row { 
            margin-bottom: 15px; font-size: 1.1rem; font-weight: 800;
            border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; 
        }
        .summary-row b { color: var(--gold); text-transform: uppercase; font-family: 'Montserrat'; }
        
        .dispatch-btn {
            width: 100%; background: var(--neon); color: var(--navy); padding: 25px;
            font-family: 'Montserrat'; font-weight: 900; font-size: 1.8rem;
            border: none; margin-top: 30px; cursor: pointer; text-transform: uppercase;
        }

        /* FOOTER NAVIGATION */
        .site-footer {
            margin-top: 80px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
        }
        .site-footer a {
            color: var(--white); text-decoration: none; font-weight: 900; font-size: 0.85rem;
            text-transform: uppercase; background: var(--navy); border: 4px solid var(--gold);
            padding: 15px 30px; transition: 0.3s; font-family: 'Montserrat';
        }
        .site-footer a:hover { box-shadow: 0 12px 0 var(--gold); transform: translateY(-8px); }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <header class="header-nav">
        <div class="brand-container">
            <img src="vv-verified-badge.png" alt="VV Logo" class="brand-logo">
            <div class="brand-text">VV HOME<br>PRO</div>
        </div>
    </header>

    <div class="main-container">
        <div class="cta-section">
            <h1>STOP WASTING $10,000+ ON <span class="neon-text">SHODDY CONTRACTORS</span> WHO GHOST YOU.</h1>
        </div>

        <div class="engine-ui">
            <div class="engine-header">
                <h2>AI MATCHING ENGINE</h2>
                <button class="refresh-btn" onclick="location.reload()">Refresh</button>
            </div>

            <div class="chat-feed" id="chatStream">
                <div class="bubble ai-msg">PROTOCOL INITIATED. STATE YOUR PROJECT (E.G. ROOFING, HVAC, WINDOWS).</div>
            </div>

            <div class="input-bar" id="inputBar">
                <input type="text" id="userInput" placeholder="TYPE PROJECT HERE..." onkeypress="handleKey(event)">
                <button class="send-btn" onclick="process()">→</button>
            </div>

            <div id="finalResult">
                <div class="data-summary">
                    <div class="summary-row"><b>Project:</b> <span id="out_issue"></span></div>
                    <div class="summary-row"><b>Scope:</b> <span id="out_scope"></span></div>
                    <div class="summary-row"><b>Name:</b> <span id="out_name"></span></div>
                    <div class="summary-row"><b>Market:</b> <span id="out_market"></span></div>
                    <div class="summary-row"><b>Contact:</b> <span id="out_phone"></span></div>
                </div>
                <button class="dispatch-btn" onclick="sendLead()">Confirm & Dispatch</button>
            </div>
        </div>

        <footer class="site-footer">
            <a href="about.html">About Us</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms of Use</a>
            <a href="standards.html">Operating Standards</a>
            <a href="contact.html">Contact Us</a>
        </footer>
    </div>

    <script>
        let step = 1;
        let data = { issue: '', scope: '', name: '', market: '', phone: '' };

        function handleKey(e) { if(e.key === 'Enter') process(); }
        function addMsg(txt, type) {
            const stream = document.getElementById('chatStream');
            const b = document.createElement('div');
            b.className = `bubble ${type}-msg`;
            b.innerText = txt.toUpperCase();
            stream.appendChild(b);
            stream.scrollTop = stream.scrollHeight;
        }

        function process() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;
            addMsg(val, 'user');
            input.value = '';

            setTimeout(() => {
                if(step === 1) { data.issue = val; addMsg("SCOPE: MAJOR LEAK, MINOR REPAIR, OR FULL REPLACEMENT?", 'ai'); step++; }
                else if(step === 2) { data.scope = val; addMsg("FULL NAME OF PROPERTY OWNER:", 'ai'); step++; }
                else if(step === 3) { data.name = val; addMsg("LOCATION (CITY AND STATE/PROVINCE):", 'ai'); step++; }
                else if(step === 4) { data.market = val; addMsg("BEST CONTACT PHONE NUMBER:", 'ai'); step++; }
                else if(step === 5) { data.phone = val; addMsg("VALIDATING... VERIFY YOUR DATA BELOW.", 'ai'); showFinal(); }
            }, 600);
        }

        function showFinal() {
            document.getElementById('inputBar').style.display = 'none';
            document.getElementById('out_name').innerText = data.name;
            document.getElementById('out_issue').innerText = data.issue;
            document.getElementById('out_scope').innerText = data.scope;
            document.getElementById('out_market').innerText = data.market;
            document.getElementById('out_phone').innerText = data.phone;
            document.getElementById('finalResult').style.display = 'block';
        }

        async function sendLead() {
            alert("MATCH DISPATCHED TO TOP-TIER PRO NETWORK");
            location.reload();
        }
    </script>
</body>
</html>
