<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME | AI Matchmaking Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #001a33; --gold: #c5a059; --neon: #39FF14; --glass: rgba(255, 255, 255, 0.96); }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f4f4; color: #000; overflow: hidden; }

        /* VIDEO BACKGROUND */
        .video-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .video-wrapper video { min-width: 100%; min-height: 100%; width: auto; height: auto; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); object-fit: cover; filter: brightness(92%); }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.3) 100%); }

        .hero-content { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px 5%; }
        
        /* THE AI ENGINE CARD */
        .engine-container {
            background: var(--glass); backdrop-filter: blur(12px); padding: 45px; border-radius: 40px; 
            width: 100%; max-width: 550px; border: 3px solid var(--navy);
            box-shadow: 0 30px 60px rgba(0,0,0,0.15); position: relative; overflow: hidden;
        }

        /* Neon Scan Animation */
        .engine-container::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--neon); box-shadow: 0 0 15px var(--neon);
            animation: scanLoop 4s infinite linear;
        }
        @keyframes scanLoop { 0% { top: 0%; } 100% { top: 100%; } }

        .step { display: none; text-align: left; }
        .step.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ai-prompt { font-size: 1.25rem; font-weight: 800; color: var(--navy); margin-bottom: 25px; line-height: 1.3; }
        input, select { width: 100%; border-radius: 12px; border: 2px solid #ddd; padding: 20px; font-family: 'Plus Jakarta Sans'; font-size: 1.1rem; font-weight: 700; color: var(--navy); outline: none; background: white; margin-bottom: 20px; }

        .btn-next { display: block; width: 100%; padding: 22px; background: var(--navy); color: #fff; border: none; font-family: 'Montserrat'; font-weight: 900; font-size: 1.2rem; border-radius: 12px; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-next:hover { background: var(--gold); }

        /* LEAD CARD DISPLAY */
        .lead-card { background: #001a33; color: white; padding: 30px; border-radius: 20px; border: 1px solid var(--neon); font-family: monospace; text-align: left; }
        .lead-card h3 { color: var(--neon); font-size: 0.9rem; margin: 0 0 15px 0; border-bottom: 1px solid rgba(57,255,20,0.3); padding-bottom: 8px; }
        .lead-line { margin-bottom: 10px; font-size: 0.9rem; line-height: 1.4; }
        .lead-line span { color: var(--gold); }
        
        .card-actions { display: flex; gap: 10px; margin-top: 25px; }
        .btn-edit { flex: 1; background: transparent; color: white; border: 1px solid white; padding: 18px; border-radius: 10px; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 0.8rem; }
        .btn-confirm { flex: 2; background: var(--neon); color: black; border: none; padding: 18px; border-radius: 10px; cursor: pointer; font-weight: 900; text-transform: uppercase; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline>
            <source src="https://player.vimeo.com/external/459389137.sd.mp4?s=910243615456b9432608c0f56a02f306d87e07a3&profile_id=164&oauth2_token_id=57447761" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <section class="hero-content">
        <div class="engine-container">
            <div class="step active" id="step1">
                <div class="ai-prompt">Describe your project (e.g., Roof leak, HVAC repair):</div>
                <input type="text" id="problem" placeholder="i have a leaky roof">
                <button class="btn-next" onclick="nextStep(2)">Next</button>
            </div>

            <div class="step" id="step2">
                <div class="ai-prompt">What is your name?</div>
                <input type="text" id="name" placeholder="Frank Jones">
                <button class="btn-next" onclick="nextStep(3)">Next</button>
            </div>

            <div class="step" id="step3">
                <div class="ai-prompt">What city are you in?</div>
                <input type="text" id="city" placeholder="Boston, MA">
                <button class="btn-next" onclick="nextStep(4)">Next</button>
            </div>

            <div class="step" id="step4">
                <div class="ai-prompt">What is your phone number?</div>
                <input type="tel" id="phone" placeholder="232-345-0967">
                <button class="btn-next" onclick="nextStep(5)">Next</button>
            </div>

            <div class="step" id="step5">
                <div class="ai-prompt">Is this a major leak, or a minor repair?</div>
                <select id="severity">
                    <option value="Minor Repair">Minor Repair</option>
                    <option value="Major Job">Major Job</option>
                </select>
                <button class="btn-next" onclick="nextStep(6)">Next</button>
            </div>

            <div class="step" id="step6">
                <div class="ai-prompt">What time works best for a pro to call you?</div>
                <input type="text" id="time" placeholder="any time after 10 am daily">
                <button class="btn-next" onclick="buildLeadCard()">Generate Lead Card</button>
            </div>

            <div class="step" id="step7">
                <div class="lead-card">
                    <h3>Lead ID: #795917</h3>
                    <p style="color:var(--neon); font-size: 0.8rem; margin-bottom: 15px;">Please verify your details:</p>
                    <div class="lead-line">Name: <span id="out-name"></span></div>
                    <div class="lead-line">Project: <span id="out-problem"></span></div>
                    <div class="lead-line">City: <span id="out-city"></span></div>
                    <div class="lead-line">Phone: <span id="out-phone"></span></div>
                    <div class="lead-line">Time: <span id="out-time"></span></div>
                    <div class="card-actions">
                        <button class="btn-edit" onclick="nextStep(1)">Edit Info</button>
                        <button class="btn-confirm" onclick="dispatchToWorker()">Confirm & Lock In</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function nextStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');
        }

        function buildLeadCard() {
            document.getElementById('out-name').innerText = document.getElementById('name').value;
            document.getElementById('out-problem').innerText = document.getElementById('problem').value + " - " + document.getElementById('severity').value;
            document.getElementById('out-city').innerText = document.getElementById('city').value;
            document.getElementById('out-phone').innerText = document.getElementById('phone').value;
            document.getElementById('out-time').innerText = document.getElementById('time').value;
            nextStep(7);
        }

        async function dispatchToWorker() {
            const btn = document.querySelector('.btn-confirm');
            btn.innerHTML = "DISPATCHING...";
            
            const data = {
                id: "795917",
                name: document.getElementById('name').value,
                problem: document.getElementById('problem').value,
                city: document.getElementById('city').value,
                phone: document.getElementById('phone').value,
                severity: document.getElementById('severity').value,
                time: document.getElementById('time').value
            };

            try {
                const response = await fetch('https://vvhomepro-brain.dbelnavis.workers.dev/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if(response.ok) {
                    alert("Lead Card Verified & Sent.");
                    location.reload();
                }
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
