<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME PRO | Top-Tier Homeowner Matchmaking</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy: #001a33; 
            --gold: #c5a059; 
            --neon: #39FF14; 
            --black: #000000;
            --white: #ffffff;
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--navy);
            overflow-x: hidden;
            color: var(--white);
        }

        /* FULL PAGE BACKGROUND IMAGE - ALIGNED WITH HOME SERVICES */
        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 26, 51, 0.75), rgba(0, 26, 51, 0.95)), 
                        url('https://images.unsplash.com/photo-1581094794329-c8112a89af12?q=80&w=2000');
            background-size: cover; background-position: center; z-index: -1;
        }

        /* HEADER BRANDING: NO SQUISHING, IDENTICAL TO CONTRACTOR SITE */
        .brand-header {
            position: absolute; top: 40px; left: 40px; display: flex; align-items: center; gap: 20px; z-index: 1000;
        }
        .brand-header img { 
            width: 85px; height: auto; display: block;
            border: 5px solid var(--white);
            box-shadow: 8px 8px 0px var(--black);
            background: #fff;
        }
        .brand-header h2 { 
            font-family: 'Montserrat'; font-size: 2.5rem; line-height: 0.85; margin: 0;
            text-transform: uppercase; letter-spacing: -2px; 
            text-shadow: 6px 6px 0px var(--black);
        }

        /* CENTERED LAYOUT */
        .main-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding: 140px 20px 80px 20px;
        }

        /* PUNCHY CTA - MIRRORING CONTRACTOR SITE ENERGY */
        .cta-container {
            text-align: center; margin-bottom: 50px; max-width: 1100px;
        }
        .cta-container h1 {
            font-family: 'Montserrat'; font-size: 3.8rem; line-height: 0.95; margin: 0;
            text-transform: uppercase; text-shadow: 8px 8px 0px var(--black);
        }
        .cta-container .highlight { color: var(--neon); }

        /* THE AI ENGINE: 1:1 INDUSTRIAL DESIGN */
        .ai-engine-frame {
            width: 100%; max-width: 650px;
            background: var(--white);
            border: 15px solid var(--black);
            box-shadow: 30px 30px 0px var(--gold);
            display: flex; flex-direction: column;
        }

        .engine-header {
            background: var(--black); color: var(--neon); padding: 25px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 10px solid var(--gold);
        }
        .engine-header h3 { 
            margin: 0; font-family: 'Montserrat'; font-size: 1.5rem; 
            letter-spacing: 2px; text-transform: uppercase;
        }
        .refresh-btn {
            background: var(--gold); color: var(--black); border: 4px solid var(--black);
            padding: 10px 20px; font-family: 'Montserrat'; font-weight: 900;
            text-transform: uppercase; cursor: pointer; font-size: 0.8rem;
        }

        /* CHAT STREAM: INDUSTRIAL WEIGHT */
        .chat-container {
            height: 400px; overflow-y: auto; padding: 30px;
            background: #e8eaed; display: flex; flex-direction: column; gap: 25px;
        }

        .bubble { 
            max-width: 85%; padding: 22px; font-size: 1.1rem; line-height: 1.4;
            font-weight: 800; border: 6px solid var(--black); text-transform: uppercase;
        }
        .ai-msg { align-self: flex-start; background: var(--white); color: var(--black); box-shadow: 10px 10px 0px var(--gold); }
        .user-msg { align-self: flex-end; background: var(--black); color: var(--neon); box-shadow: -10px 10px 0px var(--gold); }

        /* INPUT AREA: BOLD & BLOCKY */
        .input-bar { 
            padding: 30px; display: flex; gap: 15px; 
            background: var(--white); border-top: 10px solid var(--black);
        }
        input { 
            flex: 1; border: 8px solid var(--black); padding: 20px; 
            font-size: 1.2rem; font-weight: 800; outline: none; 
            text-transform: uppercase; font-family: 'Plus Jakarta Sans';
        }
        .btn-send { 
            background: var(--black); color: var(--neon); border: none; 
            width: 85px; cursor: pointer; font-size: 2.5rem; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
        }

        /* FINAL MATCH CARD */
        #finalResult { display: none; padding: 40px; background: var(--white); }
        .match-card { background: var(--black); color: var(--white); padding: 30px; border: 10px solid var(--neon); }
        .match-row { 
            margin-bottom: 15px; font-size: 1.1rem; border-bottom: 2px solid #333; 
            padding-bottom: 8px; font-family: 'Plus Jakarta Sans'; font-weight: 800;
        }
        .match-row b { color: var(--gold); font-family: 'Montserrat'; text-transform: uppercase; }
        
        .dispatch-btn {
            width: 100%; background: var(--neon); color: var(--black); padding: 25px;
            font-family: 'Montserrat'; font-weight: 900; font-size: 1.8rem;
            border: 8px solid var(--black); margin-top: 20px; cursor: pointer; text-transform: uppercase;
        }

        /* FOOTER LINKS: IDENTICAL TO CONTRACTOR SITE BARS */
        .footer-nav {
            margin-top: 80px; display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;
        }
        .footer-nav a {
            color: var(--white); text-decoration: none; font-weight: 900; font-size: 0.9rem;
            text-transform: uppercase; background: var(--black); border: 5px solid var(--gold);
            padding: 15px 30px; transition: 0.1s; font-family: 'Montserrat';
        }
        .footer-nav a:hover { background: var(--gold); color: var(--black); transform: translateY(-10px); }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="brand-header">
        <img src="vv-verified-badge.png" alt="VV Logo">
        <h2>VV HOME<br>PRO</h2>
    </div>

    <div class="main-wrapper">
        <div class="cta-container">
            <h1>STOP WASTING $10,000+ ON <span class="highlight">UNVERIFIED CONTRACTORS</span> WHO GHOST YOU.</h1>
        </div>

        <div class="ai-engine-frame">
            <div class="engine-header">
                <h3>AI MATCHING ENGINE</h3>
                <button class="refresh-btn" onclick="location.reload()">Refresh</button>
            </div>

            <div class="chat-container" id="chatStream">
                <div class="bubble ai-msg">SYSTEM ACTIVE. ENTER YOUR TRADE CATEGORY (ROOFING, HVAC, WINDOWS) TO BEGIN MATCHING.</div>
            </div>

            <div class="input-bar" id="inputBar">
                <input type="text" id="userInput" placeholder="TYPE PROJECT..." onkeypress="handleKey(event)">
                <button class="btn-send" onclick="process()">→</button>
            </div>

            <div id="finalResult">
                <div class="match-card">
                    <div class="match-row"><b>PROJECT:</b> <span id="out_issue"></span></div>
                    <div class="match-row"><b>SCOPE:</b> <span id="out_scope"></span></div>
                    <div class="match-row"><b>OWNER:</b> <span id="out_name"></span></div>
                    <div class="match-row"><b>MARKET:</b> <span id="out_market"></span></div>
                    <div class="match-row"><b>PHONE:</b> <span id="out_phone"></span></div>
                </div>
                <button class="dispatch-btn" onclick="sendLead()">Dispatch Match</button>
            </div>
        </div>

        <div class="footer-nav">
            <a href="about.html">About Us</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms of Use</a>
            <a href="standards.html">Operating Standards</a>
            <a href="contact.html">Contact Us</a>
        </div>
    </div>

    <script>
        let step = 1;
        let data = { issue: '', scope: '', name: '', market: '', phone: '' };

        function handleKey(e) { if(e.key === 'Enter') process(); }
        function addMsg(txt, type) {
            const stream = document.getElementById('chatStream');
            const b = document.createElement('div');
            b.className = `bubble ${type}-msg`;
            b.innerText = txt.toUpperCase();
            stream.appendChild(b);
            stream.scrollTop = stream.scrollHeight;
        }

        function process() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;
            addMsg(val, 'user');
            input.value = '';

            setTimeout(() => {
                if(step === 1) { data.issue = val; addMsg("SPECIFY SCOPE: MAJOR LEAK, MINOR REPAIR, OR FULL REPLACEMENT?", 'ai'); step++; }
                else if(step === 2) { data.scope = val; addMsg("IDENTIFY PROPERTY OWNER (FULL NAME):", 'ai'); step++; }
                else if(step === 3) { data.name = val; addMsg("LOCATE REGION (CITY/STATE):", 'ai'); step++; }
                else if(step === 4) { data.market = val; addMsg("SECURE CONTACT NUMBER:", 'ai'); step++; }
                else if(step === 5) { data.phone = val; addMsg("PROTOCOL COMPLETE. VERIFY DATA BELOW.", 'ai'); showFinal(); }
            }, 600);
        }

        function showFinal() {
            document.getElementById('inputBar').style.display = 'none';
            document.getElementById('out_name').innerText = data.name;
            document.getElementById('out_issue').innerText = data.issue;
            document.getElementById('out_scope').innerText = data.scope;
            document.getElementById('out_market').innerText = data.market;
            document.getElementById('out_phone').innerText = data.phone;
            document.getElementById('finalResult').style.display = 'block';
        }

        async function sendLead() {
            alert("MATCH DISPATCHED TO TOP-TIER NETWORK");
            location.reload();
        }
    </script>
</body>
</html>
