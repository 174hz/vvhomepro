<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME PRO | Dispatch Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #39FF14; --gold: #FFD700; --dark: #050505; 
            --glass: rgba(15, 15, 15, 0.85); --border: rgba(255, 255, 255, 0.15);
        }
        
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: white; overflow-x: hidden; }

        /* VIDEO BACKGROUND CLONE */
        .video-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
        .video-wrapper video { min-width: 100%; min-height: 100%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); object-fit: cover; filter: brightness(45%) contrast(105%); }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.6)); }

        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 60px 5%; }
        h1 { font-family: 'Montserrat'; font-size: clamp(2.2rem, 8vw, 4.5rem); text-transform: uppercase; letter-spacing: -3px; line-height: 0.9; margin-bottom: 20px; }
        .money { color: var(--gold); text-decoration: underline; }

        /* MAIN ENGINE CONTAINER */
        .engine-container { max-width: 800px; width: 100%; background: var(--glass); border-radius: 30px; border: 1px solid var(--border); backdrop-filter: blur(12px); padding: 40px; margin: 20px 0; text-align: left; }
        
        /* MODAL SYSTEM */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); }
        .modal-content { background: #0a0a0a; border: 1px solid var(--border); width: 95%; max-width: 800px; margin: 5vh auto; padding: 50px; border-radius: 40px; max-height: 90vh; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; top: 30px; right: 30px; cursor: pointer; color: var(--gold); font-family: 'Montserrat'; font-weight: 900; font-size: 1rem; letter-spacing: 2px; }
        
        .modal-header { font-family: 'Montserrat'; color: var(--neon); text-transform: uppercase; font-size: 1.8rem; letter-spacing: -1px; margin-bottom: 25px; border-bottom: 2px solid var(--border); padding-bottom: 15px; }
        .modal-body h3 { color: var(--gold); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px; margin-top: 30px; }
        .modal-body p { opacity: 0.8; line-height: 1.8; font-size: 1rem; margin-bottom: 20px; }

        /* CONTACT FORM INSIDE MODAL */
        .contact-form { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .form-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 20px; border-radius: 12px; color: white; font-family: inherit; font-size: 1rem; }
        .form-btn { background: var(--neon); color: black; border: none; padding: 20px; border-radius: 12px; font-family: 'Montserrat'; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .form-btn:hover { box-shadow: 0 0 20px var(--neon); }

        /* BUBBLES */
        .legal-bubbles { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 30px; }
        .bubble { padding: 12px 25px; border-radius: 50px; background: rgba(255,255,255,0.1); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: white; cursor: pointer; border: 1px solid var(--border); transition: 0.3s; }
        .bubble:hover { background: var(--gold); color: black; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline><source src="https://player.vimeo.com/external/434045526.sd.mp4?s=c3a233367a02203e4291888a71f0084f7e6f8090&profile_id=164" type="video/mp4"></video>
        <div class="video-overlay"></div>
    </div>

    <section class="hero">
        <h1>STOP WASTING <span class="money">$10,000+</span> ON SHODDY <br>CONTRACTORS WHO GHOST YOU.</h1>

        <div class="engine-container" id="mainEngine">
            <p style="text-align:center; opacity:0.5;">[VV DISPATCH ENGINE ACTIVE]</p>
        </div>

        <div class="legal-bubbles">
            <div class="bubble" onclick="openModal('about')">About Us</div>
            <div class="bubble" onclick="openModal('standards')">Operating Standards</div>
            <div class="bubble" onclick="openModal('privacy')">Privacy</div>
            <div class="bubble" onclick="openModal('terms')">Terms</div>
            <div class="bubble" onclick="openModal('contact')">Contact</div>
        </div>
    </section>

    <div id="legalModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">CLOSE [X]</span>
            <div id="modalTitle" class="modal-header"></div>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <script>
        const content = {
            about: { 
                title: "The Architecture of Certainty", 
                body: `<h3>Our Mission</h3><p>VV HOME PRO was engineered to bridge the trust gap in residential infrastructure. We operate as a high-speed dispatch layer between homeowners and the top 1% of regional contractors.</p>
                       <h3>The Problem</h3><p>Traditional lead aggregators sell your information to 5+ contractors, resulting in a race-to-the-bottom bidding war and endless spam. We fixed it by creating regional monopolies.</p>`
            },
            standards: { 
                title: "Operating Standards", 
                body: `<h3>1. Regional Exclusivity</h3><p>We partner with exactly ONE contractor per trade, per territory. This ensures 100% focus on your project without the noise of a bidding war.</p>
                       <h3>2. Intent Verification</h3><p>Every project is vetted by the VV Engine to verify scope, timeline, and ownership before a professional is ever dispatched.</p>
                       <h3>3. Response Protocol</h3><p>Our partners are contractually obligated to a 90% "First-Call" success rate. Ghosting is grounds for immediate infrastructure termination.</p>`
            },
            privacy: { 
                title: "Data Sovereignty", 
                body: `<h3>Your Information</h3><p>We do not 'sell' leads. Your data is encrypted and transmitted via secure API only to the single activated professional in your specific market.</p>
                       <h3>Security</h3><p>The VV Engine uses 256-bit encryption for all lead card data, ensuring your phone number and property details remain private until the match is confirmed.</p>`
            },
            terms: { 
                title: "Infrastructure Terms", 
                body: `<h3>Agreement</h3><p>VV Home Pro acts as a dispatch facilitator. By confirming a match, you authorize the regional infrastructure partner to contact you regarding your verified project scope.</p>
                       <h3>Liability</h3><p>Service contracts, warranties, and payments are handled directly between the property owner and the activated contractor partner.</p>`
            },
            contact: { 
                title: "Infrastructure Support", 
                body: `<p>Need human intervention or interested in joining the infrastructure as a partner? Complete the secure transmission below.</p>
                       <form class="contact-form" onsubmit="event.preventDefault(); alert('Transmission Received.');">
                           <input type="text" class="form-input" placeholder="FULL NAME" required>
                           <input type="email" class="form-input" placeholder="SECURE EMAIL" required>
                           <textarea class="form-input" style="height:120px;" placeholder="MESSAGE/INQUIRY"></textarea>
                           <button type="submit" class="form-btn">SEND TRANSMISSION</button>
                       </form>`
            }
        };

        function openModal(id) {
            document.getElementById('modalTitle').innerText = content[id].title;
            document.getElementById('modalBody').innerHTML = content[id].body;
            document.getElementById('legalModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('legalModal').style.display = 'none'; }
        window.onclick = function(e) { if (e.target == document.getElementById('legalModal')) closeModal(); }
    </script>
</body>
</html>
