<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME | Vetted & Verified Local Contractors</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #001a33; --gold: #FFD700; --neon: #39FF14; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: white; overflow-x: hidden; }

        /* HERO BACKGROUND */
        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }
        .hero-bg img {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(35%);
            animation: slowZoom 20s infinite alternate;
        }
        .hero-bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,26,51,0.4), rgba(0,0,0,0.9));
        }

        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.1); } }

        .hero-content {
            min-height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; padding: 0 5%;
        }

        /* CLEAR MESSAGING */
        h1 { font-family: 'Montserrat'; font-size: clamp(2rem, 7vw, 5rem); text-transform: uppercase; letter-spacing: -2px; line-height: 0.95; margin: 0; }
        h1 span { color: var(--gold); }

        .sub-text { 
            font-size: clamp(1.1rem, 2vw, 1.4rem); font-weight: 700; 
            margin: 25px 0; max-width: 700px; line-height: 1.4; opacity: 0.9;
        }

        /* THE ACTION BOX */
        .action-card {
            background: rgba(255,255,255,0.08); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2); padding: 40px; border-radius: 30px;
            width: 100%; max-width: 550px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .benefit { 
            display: flex; align-items: center; gap: 15px; margin-bottom: 20px; text-align: left;
            font-size: 0.95rem; font-weight: 600;
        }
        .benefit b { color: var(--neon); font-size: 1.2rem; }

        .btn-main {
            display: block; width: 100%; padding: 22px; background: var(--gold);
            color: #001a33; text-decoration: none; font-family: 'Montserrat';
            font-weight: 900; font-size: 1.2rem; border-radius: 15px;
            text-transform: uppercase; transition: 0.3s; margin-top: 10px;
        }
        .btn-main:hover { transform: scale(1.02); box-shadow: 0 0 30px var(--gold); }

        .footer-links { margin-top: 40px; display: flex; gap: 20px; }
        .footer-links a { font-size: 0.75rem; text-transform: uppercase; font-weight: 800; color: white; opacity: 0.5; text-decoration: none; letter-spacing: 1px; }
        .footer-links a:hover { opacity: 1; color: var(--neon); }
    </style>
</head>
<body>

    <div class="hero-bg">
        <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&q=80&w=2070" alt="Modern Home">
        <div class="hero-bg-overlay"></div>
    </div>

    <section class="hero-content">
        <h1>Find Your Next <span>Vetted Pro.</span></h1>
        <p class="sub-text">We maintain a private registry of elite Roofing, HVAC, and Window specialists who actually show up and deliver.</p>

        <div class="action-card">
            <div class="benefit"><b>✓</b> 100% Licensed & Insured Pros</div>
            <div class="benefit"><b>✓</b> Guaranteed 60-Minute Response</div>
            <div class="benefit"><b>✓</b> Hand-Selected for Your Region</div>
            
            <a href="why-choose-vv-pro.html" class="btn-main">Get a Verified Match</a>
        </div>

        <div class="footer-links">
            <a href="pro.html">Contractor Registry</a>
            <a href="privacy.html">Privacy</a>
        </div>
    </section>

</body>
</html>
