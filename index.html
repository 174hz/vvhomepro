<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME PRO | DISPATCH ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            /* EXACT CONTRACTOR COLOR PALETTE */
            --navy-dark: #000c1a; 
            --navy-light: #001a33;
            --gold: #c5a059; 
            --white: #ffffff; 
            --black: #000000;
            --border-gray: #222222;
        }

        * { box-sizing: border-box; }
        
        /* EXACT BACKGROUND GRADIENT FROM CONTRACTOR SITE */
        body, html { 
            margin: 0; padding: 0; min-height: 100%; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top, var(--navy-light) 0%, var(--navy-dark) 100%);
            color: var(--white);
            background-attachment: fixed;
        }

        /* HEADER BRANDING */
        .header-section { padding: 40px 60px; display: flex; align-items: center; gap: 20px; }
        .logo-box { 
            width: 65px; height: 65px; background: var(--white); 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 12px; border: 4px solid var(--black);
        }
        .logo-box img { width: 75%; }
        .logo-text { 
            font-family: 'Montserrat'; font-size: 1.8rem; line-height: 0.85; 
            text-transform: uppercase; color: var(--white); letter-spacing: -1px;
        }

        .main-layout { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; }

        /* TAGLINE - WHITE & GOLD WEIGHT */
        .hero-tagline { text-align: center; margin-bottom: 50px; max-width: 950px; }
        .hero-tagline h1 { 
            font-family: 'Montserrat'; font-size: 3rem; line-height: 1; 
            text-transform: uppercase; margin: 0; color: var(--white); 
            text-shadow: 4px 4px 0px var(--black);
        }
        .hero-tagline span { color: var(--gold); }

        /* STADIUM-SHAPED ENGINE (THE VV INFRASTRUCTURE CLONE) */
        .vv-engine-box {
            width: 100%; max-width: 600px;
            background: var(--black);
            padding: 60px 50px;
            border-radius: 80px; /* Stadium Shape */
            border: 2px solid var(--border-gray);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        .chat-feed { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .msg { padding: 16px 24px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; border-radius: 25px; line-height: 1.5; }
        
        /* AI BOXES: DARK ON DARK / USER BOXES: GOLD */
        .ai-msg { background: #0a0a0a; color: var(--white); border: 1px solid #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        .user-msg { background: var(--gold); color: var(--black); align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 800; }

        .input-area { display: flex; gap: 12px; background: #0a0a0a; padding: 12px; border-radius: 50px; border: 1px solid #333; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px 20px; font-family: 'Plus Jakarta Sans'; font-weight: 700; outline: none; text-transform: uppercase; font-size: 0.9rem; }
        .send-btn { background: var(--gold); border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; font-size: 1.4rem; font-weight: 900; color: var(--black); }

        /* FINAL LEAD CARD - CONTRACTOR STYLE */
        #finalMatch { display: none; }
        .lead-card { background: #050505; border: 1px solid #222; padding: 35px; border-radius: 40px; margin-bottom: 25px; border-left: 6px solid var(--gold); }
        .lead-title { text-align: center; margin-bottom: 30px; font-family: 'Montserrat'; font-size: 1rem; color: var(--gold); letter-spacing: 3px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .lead-row { margin-bottom: 18px; font-size: 0.85rem; display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding-bottom: 10px; }
        .lead-row b { color: var(--white); font-family: 'Montserrat'; letter-spacing: 1px; }
        .lead-row span { color: var(--gold); font-weight: 800; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .action-btn { padding: 18px; border-radius: 50px; border: none; font-family: 'Montserrat'; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
        .edit-btn { background: #222; color: var(--white); }
        .confirm-btn { background: var(--gold); color: var(--black); }
        .edit-btn:hover { background: #333; }
        .confirm-btn:hover { transform: scale(1.03); opacity: 0.9; }
        .download-btn { width: 100%; margin-top: 15px; background: var(--white); color: var(--black); }

        /* PILL FOOTER - WHITE ON NAVY */
        .footer-nav { margin-top: 80px; display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding-bottom: 60px; }
        .footer-nav a { 
            background: var(--white); color: var(--black); text-decoration: none; 
            padding: 12px 30px; font-weight: 800; font-size: 0.75rem; 
            text-transform: uppercase; border-radius: 50px; transition: 0.3s; 
        }
        .footer-nav a:hover { background: var(--gold); color: var(--white); }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="logo-box"><img src="vv-verified-badge.png" alt="VV"></div>
        <div class="logo-text">VV HOME<br>PRO</div>
    </div>

    <div class="main-layout">
        <div class="hero-tagline">
            <h1>ELIMINATE THE RISK OF <span>UNVERIFIED CONTRACTORS</span> FOREVER.</h1>
        </div>

        <div class="vv-engine-box">
            <div id="engineActive">
                <div class="chat-feed" id="chatStream">
                    <div class="msg ai-msg">IDENTIFY PROJECT CATEGORY (E.G. ROOFING, HVAC, WINDOWS).</div>
                </div>

                <div class="input-area">
                    <input type="text" id="userInput" placeholder="TYPE PROJECT TYPE..." onkeypress="handleKey(event)">
                    <button class="send-btn" onclick="process()">→</button>
                </div>
            </div>

            <div id="finalMatch">
                <div class="lead-card">
                    <div class="lead-title">DISPATCH VERIFICATION</div>
                    <div class="lead-row"><b>PROJECT:</b> <span id="out_issue"></span></div>
                    <div class="lead-row"><b>SCOPE:</b> <span id="out_scope"></span></div>
                    <div class="lead-row"><b>OWNER:</b> <span id="out_name"></span></div>
                    <div class="lead-row"><b>LOCATION:</b> <span id="out_market"></span></div>
                    <div class="lead-row"><b>CONTACT:</b> <span id="out_phone"></span></div>
                    <div class="lead-row"><b>BEST CALL:</b> <span id="out_time"></span></div>
                </div>
                
                <div class="action-grid">
                    <button class="action-btn edit-btn" onclick="resetEngine()">Edit Details</button>
                    <button class="action-btn confirm-btn" onclick="confirmLead()">Confirm Dispatch</button>
                </div>
                <button class="action-btn download-btn" onclick="downloadLead()">Download Lead Summary</button>
            </div>
        </div>

        <div class="footer-nav">
            <a href="#">About Us</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Standards</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <script>
        let step = 1;
        let data = { issue: '', scope: '', name: '', market: '', phone: '', time: '' };

        function handleKey(e) { if(e.key === 'Enter') process(); }

        function addMsg(txt, type) {
            const stream = document.getElementById('chatStream');
            const b = document.createElement('div');
            b.className = `msg ${type}-msg`;
            b.innerText = txt.toUpperCase();
            stream.appendChild(b);
            stream.scrollTop = stream.scrollHeight;
        }

        function process() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;
            addMsg(val, 'user');
            input.value = '';

            setTimeout(() => {
                if(step === 1) { data.issue = val; addMsg("SCOPE: MAJOR REPAIR OR MINOR MAINTENANCE?", 'ai-msg'); step++; }
                else if(step === 2) { data.scope = val; addMsg("FULL NAME OF PROPERTY OWNER:", 'ai-msg'); step++; }
                else if(step === 3) { data.name = val; addMsg("PROJECT CITY AND STATE:", 'ai-msg'); step++; }
                else if(step === 4) { data.market = val; addMsg("SECURE PHONE NUMBER:", 'ai-msg'); step++; }
                else if(step === 5) { data.phone = val; addMsg("BEST TIME FOR OUR PROS TO CALL?", 'ai-msg'); step++; }
                else if(step === 6) { data.time = val; showFinal(); }
            }, 500);
        }

        function showFinal() {
            document.getElementById('engineActive').style.display = 'none';
            document.getElementById('out_issue').innerText = data.issue;
            document.getElementById('out_scope').innerText = data.scope;
            document.getElementById('out_name').innerText = data.name;
            document.getElementById('out_market').innerText = data.market;
            document.getElementById('out_phone').innerText = data.phone;
            document.getElementById('out_time').innerText = data.time;
            document.getElementById('finalMatch').style.display = 'block';
        }

        function resetEngine() {
            step = 1;
            document.getElementById('finalMatch').style.display = 'none';
            document.getElementById('engineActive').style.display = 'block';
            document.getElementById('chatStream').innerHTML = '<div class="msg ai-msg">IDENTIFY PROJECT CATEGORY (E.G. ROOFING, HVAC, WINDOWS).</div>';
        }

        function confirmLead() {
            alert("VERIFICATION COMPLETE. DATA HAS BEEN DISPATCHED TO THE VV INFRASTRUCTURE.");
            location.reload();
        }

        function downloadLead() {
            const content = `
VV HOME PRO - VERIFIED LEAD CARD
================================
PROJECT:  ${data.issue.toUpperCase()}
SCOPE:    ${data.scope.toUpperCase()}
NAME:     ${data.name.toUpperCase()}
LOCATION: ${data.market.toUpperCase()}
PHONE:    ${data.phone}
AVAIL:    ${data.time.toUpperCase()}
================================
STATUS: DISPATCHED
            `;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `VV-Lead-${data.name.replace(/\s+/g, '-')}.txt`;
            a.click();
        }
    </script>
</body>
</html>
