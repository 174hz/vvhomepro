<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME | AI-Powered Home Service Matching</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #001a33; --gold: #FFD700; --neon: #39FF14; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: white; overflow-x: hidden; }

        /* THE "LIVING" BACKGROUND SYSTEM */
        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: #001a33;
        }
        .hero-bg video {
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(40%) contrast(110%);
            animation: slowZoom 20s infinite alternate;
        }
        .hero-bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,26,51,0.2) 0%, rgba(0,0,0,0.8) 100%);
        }

        @keyframes slowZoom {
            from { transform: translate(-50%, -50%) scale(1); }
            to { transform: translate(-50%, -50%) scale(1.15); }
        }

        /* CONTENT LAYOUT */
        .hero-content {
            min-height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 0 5%;
        }

        h1 { font-family: 'Montserrat'; font-size: clamp(2.5rem, 8vw, 5.5rem); text-transform: uppercase; letter-spacing: -3px; line-height: 0.9; margin: 0; }
        h1 span { color: var(--gold); }

        .sub-text { font-size: clamp(1rem, 2.5vw, 1.5rem); font-weight: 800; text-transform: uppercase; margin-top: 20px; color: rgba(255,255,255,0.8); letter-spacing: 1px; }

        /* THE CHAT/CTA INTERFACE */
        .chat-container {
            margin-top: 50px; background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2);
            padding: 30px; border-radius: 30px; width: 100%; max-width: 600px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .chat-bubble { background: white; color: black; padding: 20px; border-radius: 20px 20px 20px 0; text-align: left; font-weight: 700; margin-bottom: 25px; font-size: 1.1rem; }

        .btn-main {
            display: block; width: 100%; padding: 22px; background: var(--gold);
            color: #001a33; text-decoration: none; font-family: 'Montserrat';
            font-weight: 900; font-size: 1.3rem; border-radius: 15px;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-main:hover { transform: scale(1.03); background: white; box-shadow: 0 0 30px var(--gold); }

        .pro-link { margin-top: 30px; font-size: 0.8rem; text-transform: uppercase; font-weight: 800; color: white; opacity: 0.6; text-decoration: none; }
        .pro-link:hover { opacity: 1; color: var(--neon); }
    </style>
</head>
<body>

    <div class="hero-bg">
        <video autoplay muted loop playsinline poster="http://googleusercontent.com/image_collection/image_retrieval/5132630992915125046_0">
            <source src="https://player.vimeo.com/external/459389137.sd.mp4?s=910243615456b9432608c0f56a02f306d87e07a3&profile_id=164&oauth2_token_id=57447761" type="video/mp4">
        </video>
        <div class="hero-bg-overlay"></div>
    </div>

    <section class="hero-content">
        <h1>Your Home. <span>Verified.</span></h1>
        <p class="sub-text">The AI Engine that matches you with Elite Local Pros.</p>

        <div class="chat-container">
            <div class="chat-bubble">
                "Hi! I'm the VV AI. I'll help you find the best Roofer or HVAC pro in your area in under 60 seconds. Ready to start?"
            </div>
            <a href="why-choose-vv-pro.html" class="btn-main">Get Started Now</a>
        </div>

        <a href="pro.html" class="pro-link">Are you a Contractor? Access the Pro Registry →</a>
    </section>

</body>
</html>
