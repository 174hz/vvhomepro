<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME | Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #001a33; --gold: #c5a059; --neon: #39FF14; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 40px 20px; }

        .engine-card {
            background: #fff; padding: 40px; border-radius: 30px; 
            width: 100%; max-width: 600px; border: 3px solid var(--navy);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .engine-header { font-family: 'Montserrat'; font-weight: 900; font-size: 1.8rem; color: var(--navy); margin-bottom: 30px; text-transform: uppercase; border-bottom: 5px solid var(--gold); display: inline-block; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 800; color: var(--navy); margin-bottom: 10px; font-size: 1rem; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 18px; border-radius: 12px; border: 2px solid #ddd; font-family: inherit; font-weight: 700; font-size: 1.1rem; outline: none; background: #fafafa; }
        textarea { height: 100px; resize: none; }
        input:focus { border-color: var(--navy); background: #fff; }

        .btn-generate { width: 100%; padding: 22px; background: var(--navy); color: white; border: none; font-family: 'Montserrat'; font-weight: 900; border-radius: 15px; text-transform: uppercase; cursor: pointer; font-size: 1.2rem; margin-top: 20px; transition: 0.3s; }
        .btn-generate:hover { background: var(--gold); }

        /* THE LEAD CARD */
        #leadCard { display: none; background: var(--navy); color: white; padding: 35px; border-radius: 25px; border: 2px solid var(--neon); font-family: monospace; margin-top: 30px; }
        .card-header { color: var(--neon); margin-bottom: 20px; font-weight: bold; font-size: 1.1rem; border-bottom: 1px solid rgba(57,255,20,0.3); padding-bottom: 10px; }
        .card-row { margin-bottom: 12px; font-size: 1rem; line-height: 1.4; }
        .card-row span { color: var(--gold); }
        .confirm-btn { width: 100%; padding: 20px; background: var(--neon); color: black; border: none; font-family: 'Montserrat'; font-weight: 900; border-radius: 12px; text-transform: uppercase; margin-top: 25px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="engine-card">
        <div class="engine-header">Project Engine</div>
        
        <div class="form-group">
            <label>State your issue:</label>
            <textarea id="issue" placeholder="Describe the problem (e.g., Leaky roof in the master bedroom)"></textarea>
        </div>

        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" id="name" placeholder="Frank Jones">
        </div>

        <div class="form-group">
            <label>City:</label>
            <input type="text" id="city" placeholder="Boston, MA">
        </div>

        <div class="form-group">
            <label>Phone Number:</label>
            <input type="tel" id="phone" placeholder="232-345-0967">
        </div>

        <div class="form-group">
            <label>Scope of Job:</label>
            <select id="scope">
                <option value="Minor Repair">Minor Repair</option>
                <option value="Major Job">Major Job</option>
            </select>
        </div>

        <div class="form-group">
            <label>Best Time to Call:</label>
            <input type="text" id="time" placeholder="Any time after 10am daily">
        </div>

        <button class="btn-generate" onclick="generate()">Generate Lead Card</button>

        <div id="leadCard">
            <div class="card-header">LEAD ID: #795917 | VERIFIED STATUS</div>
            <div class="card-row">NAME: <span id="out-name"></span></div>
            <div class="card-row">ISSUE: <span id="out-issue"></span></div>
            <div class="card-row">CITY: <span id="out-city"></span></div>
            <div class="card-row">PHONE: <span id="out-phone"></span></div>
            <div class="card-row">TIME: <span id="out-time"></span></div>
            <button class="confirm-btn" onclick="sendToWorker()">Confirm & Dispatch Lead</button>
        </div>
    </div>

    <script>
        function generate() {
            document.getElementById('out-name').innerText = document.getElementById('name').value;
            document.getElementById('out-issue').innerText = document.getElementById('issue').value + " (" + document.getElementById('scope').value + ")";
            document.getElementById('out-city').innerText = document.getElementById('city').value;
            document.getElementById('out-phone').innerText = document.getElementById('phone').value;
            document.getElementById('out-time').innerText = document.getElementById('time').value;
            document.getElementById('leadCard').style.display = 'block';
            document.getElementById('leadCard').scrollIntoView({ behavior: 'smooth' });
        }

        async function sendToWorker() {
            const btn = document.querySelector('.confirm-btn');
            btn.innerText = "DISPATCHING...";
            
            const payload = {
                name: document.getElementById('name').value,
                issue: document.getElementById('issue').value,
                city: document.getElementById('city').value,
                phone: document.getElementById('phone').value,
                scope: document.getElementById('scope').value,
                time: document.getElementById('time').value,
                timestamp: new Date().toISOString()
            };

            try {
                const response = await fetch('https://vvhomepro-brain.dbelnavis.workers.dev/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    alert("Lead #795917 has been locked and dispatched.");
                    location.reload();
                }
            } catch(e) { 
                alert("Dispatch Error. Check console.");
                console.error(e); 
            }
        }
    </script>
</body>
</html>
