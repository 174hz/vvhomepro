<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME PRO | MATCHING ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        /* INDUSTRIAL RESET - NO ROUNDED CORNERS */
        * { box-sizing: border-box !important; border-radius: 0 !important; cursor: crosshair; }
        
        :root { 
            --navy: #001a33; --gold: #c5a059; --neon: #39FF14; --black: #000000; --white: #ffffff; 
        }

        body { 
            margin: 0; padding: 0; background: var(--navy) !important; 
            font-family: 'Montserrat', sans-serif !important; overflow-x: hidden;
        }

        /* DYNAMIC BACKGROUND */
        .hero-video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 26, 51, 0.8), rgba(0, 26, 51, 0.9)), 
                        url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?q=80&w=2000');
            background-size: cover; background-position: center; z-index: -1;
        }

        /* HEADER: BRANDING PROTECTION */
        .top-brand {
            position: absolute; top: 50px; left: 50px; display: flex; align-items: center; gap: 20px; z-index: 1000;
        }
        .logo-frame {
            width: 110px !important; height: 110px !important; background: #fff !important;
            border: 12px solid var(--black) !important; display: flex; align-items: center; justify-content: center;
        }
        .logo-frame img { width: 85% !important; height: auto !important; object-fit: contain !important; }
        
        .brand-name {
            font-size: 3.5rem !important; line-height: 0.8 !important; color: #fff !important;
            text-transform: uppercase !important; letter-spacing: -4px !important;
            text-shadow: 10px 10px 0px var(--black) !important;
        }

        /* MAIN LAYOUT CORE */
        .engine-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding: 200px 20px 100px 20px;
        }

        /* CTA: IDENTICAL WEIGHT TO CONTRACTOR SITE */
        .punchy-cta {
            text-align: center; margin-bottom: 60px; max-width: 1200px;
        }
        .punchy-cta h1 {
            color: #fff !important; font-size: 4.5rem !important; line-height: 0.9 !important; margin: 0;
            text-transform: uppercase !important; text-shadow: 15px 15px 0px var(--black) !important;
        }
        .punchy-cta span { color: var(--neon) !important; }

        /* THE AI MATCHING ENGINE BOX */
        .industrial-engine {
            width: 100% !important; max-width: 750px !important;
            background: var(--white) !important;
            border: 18px solid var(--black) !important;
            box-shadow: 50px 50px 0px var(--gold) !important;
        }

        .engine-top {
            background: var(--black) !important; color: var(--neon) !important; padding: 30px !important;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 15px solid var(--gold) !important;
        }
        .engine-top h2 { margin: 0 !important; font-size: 2rem !important; letter-spacing: 3px !important; }
        
        .btn-refresh {
            background: var(--gold) !important; color: #000 !important; border: 6px solid #000 !important;
            padding: 12px 25px !important; font-weight: 900 !important; text-transform: uppercase; cursor: pointer;
        }

        /* CHAT INTERFACE */
        .chat-area {
            height: 450px !important; overflow-y: auto; padding: 40px !important;
            background: #e2e8f0 !important; display: flex; flex-direction: column; gap: 30px;
        }

        .bubble { 
            padding: 25px !important; font-size: 1.5rem !important; font-weight: 900 !important;
            border: 10px solid var(--black) !important; text-transform: uppercase !important; line-height: 1;
        }
        .ai { background: #fff !important; color: #000 !important; box-shadow: 15px 15px 0px var(--gold) !important; width: 85%; }
        .user { align-self: flex-end; background: #000 !important; color: var(--neon) !important; box-shadow: -15px 15px 0px var(--gold) !important; width: 85%; }

        /* INPUT AREA */
        .input-box {
            padding: 40px !important; display: flex; gap: 20px; 
            background: #fff !important; border-top: 15px solid var(--black) !important;
        }
        input {
            flex: 1 !important; border: 12px solid var(--black) !important; padding: 25px !important;
            font-size: 1.8rem !important; font-weight: 900 !important; font-family: 'Montserrat' !important;
            text-transform: uppercase !important; outline: none;
        }
        .btn-send { background: var(--black) !important; color: var(--neon) !important; width: 120px !important; font-size: 4rem !important; border: none; cursor: pointer; }

        /* FINAL CARD PIZZAZZ */
        #finalMatch { display: none; padding: 50px !important; background: #fff !important; }
        .match-card { background: #000 !important; color: #fff !important; padding: 45px !important; border: 20px solid var(--neon) !important; }
        .match-line { font-size: 1.5rem !important; margin-bottom: 20px !important; border-bottom: 5px solid #222 !important; padding-bottom: 12px; font-weight: 900; }
        .match-line b { color: var(--gold) !important; }
        
        .btn-dispatch {
            width: 100% !important; padding: 40px !important; background: var(--neon) !important;
            color: #000 !important; font-size: 3rem !important; font-weight: 900 !important;
            border: 12px solid var(--black) !important; margin-top: 30px !important; cursor: pointer; text-transform: uppercase;
        }

        /* FOOTER BARS */
        .bottom-nav { margin-top: 120px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding-bottom: 60px; }
        .bottom-nav a { 
            background: #000 !important; color: #fff !important; text-decoration: none !important;
            padding: 25px 50px !important; border: 10px solid var(--gold) !important;
            font-size: 1.3rem !important; font-weight: 900 !important; text-transform: uppercase !important;
        }
    </style>
</head>
<body>

    <div class="hero-video-bg"></div>

    <div class="top-brand">
        <div class="logo-frame">
            <img src="vv-verified-badge.png" alt="Logo">
        </div>
        <div class="brand-name">VV HOME<br>PRO</div>
    </div>

    <div class="engine-wrapper">
        <div class="punchy-cta">
            <h1>STOP WASTING $10,000+ ON <span>SHODDY CONTRACTORS</span> WHO NEVER SHOW UP.</h1>
        </div>

        <div class="industrial-engine">
            <div class="engine-top">
                <h2>AI MATCHING ENGINE</h2>
                <button class="btn-refresh" onclick="location.reload()">Refresh</button>
            </div>

            <div class="chat-area" id="chatStream">
                <div class="bubble ai">SYSTEM ACTIVE. ENTER PROJECT (ROOFING, HVAC, WINDOWS, RENOVATION).</div>
            </div>

            <div class="input-box" id="inputTray">
                <input type="text" id="userInput" placeholder="TYPE HERE..." onkeypress="handleKey(event)">
                <button class="btn-send" onclick="process()">→</button>
            </div>

            <div id="finalMatch">
                <div class="match-card">
                    <div class="match-line"><b>PROJECT:</b> <span id="out_issue"></span></div>
                    <div class="match-line"><b>NAME:</b> <span id="out_name"></span></div>
                    <div class="match-line"><b>LOCATION:</b> <span id="out_market"></span></div>
                    <div class="match-line"><b>CONTACT:</b> <span id="out_phone"></span></div>
                </div>
                <button class="btn-dispatch" onclick="alert('DISPATCHED TO TOP-TIER NETWORK')">Dispatch Match</button>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="about.html">About Us</a>
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
            <a href="standards.html">Standards</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>

    <script>
        let step = 1; let data = { issue: '', name: '', market: '', phone: '' };
        function handleKey(e) { if(e.key === 'Enter') process(); }
        function addMsg(txt, type) {
            const stream = document.getElementById('chatStream');
            const b = document.createElement('div');
            b.className = `bubble ${type}`;
            b.innerText = txt.toUpperCase();
            stream.appendChild(b);
            stream.scrollTop = stream.scrollHeight;
        }
        function process() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;
            addMsg(val, 'user');
            input.value = '';
            setTimeout(() => {
                if(step === 1) { data.issue = val; addMsg("NAME OF PROPERTY OWNER:", 'ai'); step++; }
                else if(step === 2) { data.name = val; addMsg("CITY/STATE FOR PROJECT:", 'ai'); step++; }
                else if(step === 3) { data.market = val; addMsg("PHONE NUMBER:", 'ai'); step++; }
                else if(step === 4) { data.phone = val; addMsg("VERIFY DATA BELOW.", 'ai'); showFinal(); }
            }, 500);
        }
        function showFinal() {
            document.getElementById('inputTray').style.display = 'none';
            document.getElementById('out_name').innerText = data.name;
            document.getElementById('out_issue').innerText = data.issue;
            document.getElementById('out_market').innerText = data.market;
            document.getElementById('out_phone').innerText = data.phone;
            document.getElementById('finalMatch').style.display = 'block';
        }
    </script>
</body>
</html>
