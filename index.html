<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME | AI Matchmaking Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy: #001a33; 
            --gold: #c5a059; 
            --neon: #39FF14; 
            --glass: rgba(255, 255, 255, 0.85); 
        }
        
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f4f4; color: #000; overflow-x: hidden; }

        /* HIGH VISIBILITY VIDEO BACKGROUND */
        .video-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }
        .video-wrapper video {
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(85%) contrast(100%);
        }
        .video-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.4) 100%);
        }

        .hero-content {
            min-height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 80px 5%;
        }

        h1 { 
            font-family: 'Montserrat'; font-size: clamp(2.5rem, 8vw, 5.5rem); 
            text-transform: uppercase; letter-spacing: -3px; line-height: 0.9; margin: 0; 
            color: var(--navy);
        }
        h1 span { color: var(--gold); }

        /* THE AI MATCHING ENGINE CARD */
        .engine-container {
            margin-top: 40px; 
            background: var(--glass);
            backdrop-filter: blur(10px); 
            padding: 40px; border-radius: 40px; width: 100%; max-width: 600px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            position: relative; overflow: hidden;
            border: 2px solid var(--navy);
        }

        /* The Neon Scan Animation */
        .engine-container::after {
            content: ''; position: absolute; top: -100%; left: 0; width: 100%; height: 5px;
            background: var(--neon);
            box-shadow: 0 0 15px var(--neon);
            animation: scan 3s infinite linear; pointer-events: none;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        .engine-header { color: var(--navy); font-family: 'Montserrat'; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; font-weight: 900; }

        .chat-bubble { 
            background: white; color: var(--navy); padding: 25px; 
            border-radius: 25px 25px 25px 0; text-align: left; 
            font-weight: 800; margin-bottom: 30px; font-size: 1.15rem;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .btn-main {
            display: block; width: 100%; padding: 22px; background: var(--navy);
            color: #fff; text-decoration: none; font-family: 'Montserrat';
            font-weight: 900; font-size: 1.3rem; border-radius: 15px;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-main:hover { transform: scale(1.03); box-shadow: 0 10px 30px rgba(0,26,51,0.2); }

        /* LEGAL BUBBLES */
        .legal-bubbles { display: flex; justify-content: center; gap: 12px; margin-top: 50px; flex-wrap: wrap; }
        .bubble { 
            padding: 10px 20px; border-radius: 50px; background: var(--navy); 
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase; 
            color: #fff; cursor: pointer; border: 1px solid var(--navy); transition: 0.3s; 
        }
        .bubble:hover { background: var(--gold); border-color: var(--gold); }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline>
            <source src="https://player.vimeo.com/external/459389137.sd.mp4?s=910243615456b9432608c0f56a02f306d87e07a3&profile_id=164&oauth2_token_id=57447761" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <section class="hero-content">
        <h1>Vetted. Verified. <span>Matched.</span></h1>
        
        <div class="engine-container">
            <div class="engine-header">AI Matching Engine Active</div>
            <div class="chat-bubble">
                "I'm scanning the registry for elite Roofing, HVAC, and Window specialists in your area. Ready to find your match?"
            </div>
            <a href="#" class="btn-main" onclick="alert('Initializing Regional Scan...')">Launch AI Engine</a>
        </div>

        <div class="legal-bubbles">
            <div class="bubble">Privacy Policy</div>
            <div class="bubble">Consumer Terms</div>
            <div class="bubble">Vetting Standards</div>
        </div>
    </section>

</body>
</html>
