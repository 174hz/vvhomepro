<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #c5a059; --white: #ffffff; --black: #000000; --navy: #001a33;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        /* EXACT CONTRACTOR SITE BACKGROUND */
        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 26, 51, 0.8), rgba(0, 26, 51, 0.9)), 
                        url('https://images.unsplash.com/photo-1541888946425-d81bb19480c5?q=80&w=2000');
            background-size: cover; background-position: center; z-index: -1;
        }

        /* HEADER BRANDING */
        .header-section { padding: 40px 60px; display: flex; align-items: center; gap: 20px; }
        .logo-box { width: 65px; height: 65px; background: #fff; border: 4px solid #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .logo-text { font-family: 'Montserrat'; font-size: 1.8rem; line-height: 0.85; text-transform: uppercase; color: #fff; letter-spacing: -1px; }

        .main-layout { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; min-height: calc(100vh - 200px); }

        /* TAGLINE: EXACT FONT SIZES & COLORS FROM CONTRACTOR SITE */
        .hero-tagline { text-align: center; margin-bottom: 50px; max-width: 1000px; }
        .hero-tagline h1 { 
            font-family: 'Montserrat'; font-size: 3.2rem; line-height: 1.1; 
            text-transform: uppercase; margin: 0; color: #fff; 
        }
        .hero-tagline span { color: var(--gold); } /* "$10,000+" in Yellow */

        /* THE VV INFRASTRUCTURE BLOCK (NOW THE AI ENGINE) */
        .vv-infrastructure-box {
            width: 100%; max-width: 650px;
            background: var(--black);
            border: 20px solid var(--black); /* The thick industrial frame */
            display: flex; flex-direction: column;
        }

        .vv-header {
            padding: 15px 0; border-bottom: 4px solid #222;
            display: flex; justify-content: space-between; align-items: center;
        }
        .vv-header h2 { 
            margin: 0; font-family: 'Montserrat'; font-size: 1.2rem; 
            color: var(--white); text-transform: uppercase; letter-spacing: 2px;
        }
        
        /* AI ENGINE FEED */
        .chat-feed {
            height: 320px; overflow-y: auto; padding: 25px 0;
            background: var(--black); display: flex; flex-direction: column; gap: 20px;
        }
        .msg { padding: 18px; font-size: 0.9rem; font-weight: 800; line-height: 1.3; }
        .ai-msg { background: #111; color: var(--white); border: 2px solid #333; width: 90%; }
        .user-msg { align-self: flex-end; background: var(--gold); color: var(--black); width: 90%; font-weight: 900; }

        /* INPUT AREA */
        .input-tray { 
            padding: 20px 0 10px 0; display: flex; gap: 10px; 
            background: var(--black); border-top: 4px solid #222;
        }
        input { 
            flex: 1; border: 3px solid #333; background: #111; color: white; padding: 15px; 
            font-size: 1rem; font-weight: 700; font-family: 'Plus Jakarta Sans'; outline: none;
        }
        .btn-send { background: var(--gold); color: var(--black); border: none; width: 60px; font-size: 1.8rem; cursor: pointer; }

        /* FINAL CARD - INDUSTRIAL STYLE */
        #finalMatch { display: none; padding: 20px 0; }
        .lead-card { background: #111; padding: 25px; border-left: 8px solid var(--gold); }
        .lead-row { margin-bottom: 12px; font-size: 0.9rem; border-bottom: 1px solid #222; padding-bottom: 8px; color: #aaa; }
        .lead-row b { color: var(--white); margin-right: 10px; text-transform: uppercase; }
        .lead-row span { color: var(--gold); font-weight: 800; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .action-btn { padding: 15px; font-family: 'Montserrat'; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        .edit-btn { background: #333; color: white; }
        .confirm-btn { background: var(--gold); color: black; }
        .download-btn { width: 100%; margin-top: 10px; background: white; color: black; padding: 15px; font-weight: 900; text-transform: uppercase; border: none; cursor: pointer; }

        /* PILL FOOTER */
        .footer-nav { margin-top: 60px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding-bottom: 50px; }
        .footer-nav a { background: #fff; color: #000; text-decoration: none; padding: 12px 30px; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; border-radius: 50px; border: 2px solid #000; }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="header-section">
        <div class="logo-box"></div>
        <div class="logo-text">VV HOME<br>PRO</div>
    </div>

    <div class="main-layout">
        <div class="hero-tagline">
            <h1>STOP WASTING <span>$10,000+</span> ON SHODDY CONTRACTORS WHO GHOST YOU.</h1>
        </div>

        <div class="vv-infrastructure-box">
            <div id="engineActive">
                <div class="vv-header">
                    <h2>THE VV ENGINE</h2>
                    <div style="font-size: 0.7rem; color: #666; font-weight: 800;">STATUS: ACTIVE</div>
                </div>

                <div class="chat-feed" id="chatStream">
                    <div class="msg ai-msg">What project category do you need help with? (e.g. Roofing, HVAC, Windows)</div>
                </div>

                <div class="input-tray">
                    <input type="text" id="userInput" placeholder="TYPE HERE..." onkeypress="handleKey(event)">
                    <button class="btn-send" onclick="process()">→</button>
                </div>
            </div>

            <div id="finalMatch">
                <div class="lead-card">
                    <div class="lead-row"><b>Project:</b> <span id="out_issue"></span></div>
                    <div class="lead-row"><b>Scope:</b> <span id="out_scope"></span></div>
                    <div class="lead-row"><b>Owner:</b> <span id="out_name"></span></div>
                    <div class="lead-row"><b>Location:</b> <span id="out_market"></span></div>
                    <div class="lead-row"><b>Phone:</b> <span id="out_phone"></span></div>
                    <div class="lead-row"><b>Best Call:</b> <span id="out_time"></span></div>
                </div>
                <div class="action-grid">
                    <button class="action-btn edit-btn" onclick="resetEngine()">Edit</button>
                    <button class="action-btn confirm-btn" onclick="alert('Dispatched!')">Confirm</button>
                </div>
                <button class="action-btn download-btn" onclick="downloadLead()">Download Summary</button>
            </div>
        </div>

        <div class="footer-nav">
            <a href="#">About Us</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Standards</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <script>
        let step = 1;
        let data = { issue: '', scope: '', name: '', market: '', phone: '', time: '' };
        function handleKey(e) { if(e.key === 'Enter') process(); }
        function addMsg(txt, type) {
            const stream = document.getElementById('chatStream');
            const b = document.createElement('div');
            b.className = `msg ${type}-msg`; b.innerText = txt;
            stream.appendChild(b); stream.scrollTop = stream.scrollHeight;
        }
        function process() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;
            addMsg(val, 'user'); input.value = '';
            setTimeout(() => {
                if(step === 1) { data.issue = val; addMsg("Is this a Major repair or Minor maintenance?", 'ai-msg'); step++; }
                else if(step === 2) { data.scope = val; addMsg("Full Name of the property owner:", 'ai-msg'); step++; }
                else if(step === 3) { data.name = val; addMsg("City and State for the project:", 'ai-msg'); step++; }
                else if(step === 4) { data.market = val; addMsg("Your secure Phone Number:", 'ai-msg'); step++; }
                else if(step === 5) { data.phone = val; addMsg("What is the best time for our pros to call?", 'ai-msg'); step++; }
                else if(step === 6) { data.time = val; showFinal(); }
            }, 500);
        }
        function showFinal() {
            document.getElementById('engineActive').style.display = 'none';
            document.getElementById('out_issue').innerText = data.issue;
            document.getElementById('out_scope').innerText = data.scope;
            document.getElementById('out_name').innerText = data.name;
            document.getElementById('out_market').innerText = data.market;
            document.getElementById('out_phone').innerText = data.phone;
            document.getElementById('out_time').innerText = data.time;
            document.getElementById('finalMatch').style.display = 'block';
        }
        function resetEngine() {
            step = 1; document.getElementById('finalMatch').style.display = 'none';
            document.getElementById('engineActive').style.display = 'block';
            document.getElementById('chatStream').innerHTML = '<div class="msg ai-msg">What project category do you need help with?</div>';
        }
        function downloadLead() {
            const content = `Project: ${data.issue}\nScope: ${data.scope}\nName: ${data.name}\nLocation: ${data.market}\nPhone: ${data.phone}\nTime: ${data.time}`;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `VV-Lead.txt`; a.click();
        }
    </script>
</body>
</html>
