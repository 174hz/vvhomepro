<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME PRO | AI Matching Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #FFD700; --dark: #050505; --success: #2ECC71; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: white; overflow: hidden; }

        /* BACKGROUND SYSTEM */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: #111 url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&q=80&w=2070') center/cover;
        }
        video { min-width: 100%; min-height: 100%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); object-fit: cover; filter: brightness(80%); }

        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px 5%; position: relative; z-index: 10; }
        h1 { font-family: 'Montserrat'; font-size: clamp(2rem, 6vw, 4rem); text-transform: uppercase; letter-spacing: -2px; margin: 0 0 20px 0; line-height: 0.95; }
        .money { color: var(--gold); text-decoration: underline; }

        /* ENGINE BOX */
        .engine-container { 
            max-width: 700px; width: 100%; background: #ffffff; 
            border-radius: 35px; padding: 35px; color: #1a1a1a; text-align: left;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7); position: relative; min-height: 450px;
        }

        /* REFRESH BUTTON (ALWAYS VISIBLE TOP RIGHT) */
        #topRefresh {
            position: absolute; top: 25px; right: 25px; 
            background: #000; color: #fff; border: none; 
            padding: 10px 18px; border-radius: 12px; cursor: pointer; 
            font-size: 0.75rem; font-weight: 900; z-index: 999;
        }

        .chat-feed { height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .msg { padding: 16px 20px; border-radius: 20px; font-weight: 700; font-size: 0.95rem; line-height: 1.4; max-width: 85%; }
        .ai-msg { background: #f2f2f2; align-self: flex-start; }
        .user-msg { background: var(--gold); align-self: flex-end; color: black; }

        .input-row { display: flex; gap: 10px; }
        input, textarea { flex: 1; height: 65px; border-radius: 18px; border: 2px solid #eee; padding: 0 20px; font-weight: 800; font-size: 1.1rem; outline: none; font-family: inherit; }
        .send-btn { width: 70px; background: #000; color: white; border: none; border-radius: 18px; cursor: pointer; font-size: 1.5rem; }

        /* CONTACT FORM OVERRIDE */
        #contactForm { display: none; flex-direction: column; gap: 10px; }
        #contactForm input, #contactForm textarea { width: 100%; margin-bottom: 10px; height: 50px; }
        #contactForm textarea { height: 100px; padding: 15px; }

        /* LEAD CARD */
        #finalCard { display: none; }
        .lead-card { background: #fafafa; border: 1px solid #eee; border-left: 10px solid var(--gold); border-radius: 25px; padding: 30px; margin-bottom: 20px; }
        .lead-card.confirmed { border-left-color: var(--success); background: #fafffa; }
        .lead-line { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 12px 0; font-size: 0.9rem; }
        .lead-line b { font-family: 'Montserrat'; font-size: 0.65rem; text-transform: uppercase; color: #999; }
        .lead-line span { color: #000; font-weight: 900; }

        .btn { width: 100%; padding: 22px; border-radius: 20px; border: none; font-family: 'Montserrat'; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .confirm { background: #000; color: white; }
        .edit { background: #eee; color: #666; }
        .download { background: var(--success); color: white; display: none; }

        /* LEGAL LINKS */
        .legal-nav { display: flex; justify-content: center; gap: 15px; margin-top: 35px; flex-wrap: wrap; }
        .bubble { padding: 12px 24px; border-radius: 50px; background: rgba(255,255,255,0.1); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: white; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); text-decoration: none; }

        /* OVERLAY PANEL */
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .overlay-content { background: white; color: #000; padding: 40px; border-radius: 30px; max-width: 500px; width: 90%; text-align: left; }
    </style>
</head>
<body>

    <div class="bg-container">
        <video autoplay muted loop playsinline><source src="https://player.vimeo.com/external/434045526.sd.mp4?s=c3a233367a02203e4291888a71f0084f7e6f8090&profile_id=164" type="video/mp4"></video>
    </div>

    <div id="legalOverlay" class="overlay" onclick="this.style.display='none'">
        <div class="overlay-content" onclick="event.stopPropagation()">
            <h2 id="otitle" style="font-family:'Montserrat';"></h2>
            <p id="obody" style="line-height:1.6; font-weight:600;"></p>
            <button class="btn edit" onclick="document.getElementById('legalOverlay').style.display='none'">Close</button>
        </div>
    </div>

    <section class="hero">
        <h1>STOP WASTING <span class="money">$10,000+</span> ON SHODDY <br>CONTRACTORS WHO GHOST YOU.</h1>

        <div class="engine-container">
            <button id="topRefresh" onclick="location.reload()">REFRESH ↻</button>

            <div id="interface">
                <div style="font-weight:900; font-size:0.7rem; color:#bbb; text-transform:uppercase; margin-bottom:15px;">Verified Matching Engine</div>
                <div class="chat-feed" id="chatFeed">
                    <div class="msg ai-msg">Tell us about your project (Roofing, HVAC, Windows, etc.)</div>
                </div>
                <div class="input-row">
                    <input type="text" id="userIn" placeholder="Type here..." onkeypress="if(event.key==='Enter') process()">
                    <button class="send-btn" onclick="process()">→</button>
                </div>
            </div>

            <div id="contactForm">
                <h2 style="font-family:'Montserrat'; margin:0 0 20px 0;">Contact Concierge</h2>
                <form action="https://formspree.io/f/mykngbap" method="POST">
                    <input type="email" name="email" placeholder="Your Email" required>
                    <textarea name="message" placeholder="How can we help you?" required></textarea>
                    <button type="submit" class="btn confirm">Send Message</button>
                    <button type="button" class="btn edit" onclick="location.reload()">Back</button>
                </form>
            </div>

            <div id="finalCard">
                <div id="downloadArea">
                    <div style="font-family:'Montserrat'; font-weight:900; margin-bottom:15px; text-transform:uppercase; font-size:0.8rem; text-align:center;">Official Project Lead #VV-<span id="pid"></span></div>
                    <div class="lead-card" id="mainCard">
                        <div class="lead-line"><b>Project</b> <span id="l_project"></span></div>
                        <div class="lead-line"><b>Scale</b> <span id="l_scale"></span></div>
                        <div class="lead-line"><b>Owner</b> <span id="l_name"></span></div>
                        <div class="lead-line"><b>Market</b> <span id="l_location"></span></div>
                        <div class="lead-line"><b>Contact</b> <span id="l_phone"></span></div>
                        <div class="lead-line"><b>Window</b> <span id="l_time"></span></div>
                    </div>
                </div>
                <div id="cardBtns">
                    <button class="btn confirm" onclick="confirmLead()">Confirm & Match</button>
                    <button class="btn edit" onclick="location.reload()">Edit Details</button>
                </div>
                <button class="btn download" id="dlBtn" onclick="downloadCard()">Download PNG Card</button>
            </div>
        </div>

        <nav class="legal-nav">
            <a class="bubble" onclick="showLegal('About Us', 'VV Home Pro bridges the gap between high-value homeowners and vetted contractors.')">About Us</a>
            <a class="bubble" onclick="showLegal('Operating Standards', 'Our 10-point vetting process ensures zero-ghosting and quality results.')">Operating Standards</a>
            <a class="bubble" onclick="showLegal('Privacy', 'Data is only shared with your matched contractor.')">Privacy</a>
            <a class="bubble" onclick="showLegal('Terms', 'Request professional quotes from our vetted network.')">Terms</a>
            <a class="bubble" onclick="openContact()">Contact</a>
        </nav>
    </section>

    <script>
        let leadData = { p:'', s:'', n:'', l:'', ph:'', t:'' };
        let step = 0;
        const Q = ["What scale? (Repair/Replace/New)", "Full Name?", "City/Market?", "Phone number?", "Best time to call?"];

        function addMsg(t, type) {
            const f = document.getElementById('chatFeed');
            const d = document.createElement('div');
            d.className = `msg ${type}-msg`; d.innerText = t;
            f.appendChild(d); f.scrollTop = f.scrollHeight;
        }

        function process() {
            const i = document.getElementById('userIn');
            const v = i.value.trim(); if(!v) return;
            addMsg(v, 'user'); i.value = "";
            if(step===0) leadData.p=v; else if(step===1) leadData.s=v; else if(step===2) leadData.n=v; 
            else if(step===3) leadData.l=v; else if(step===4) leadData.ph=v; else if(step===5) leadData.t=v;
            setTimeout(() => {
                if(step < 5) { addMsg(Q[step], 'ai'); step++; }
                else { addMsg("Excellent. Generating your Vetted Lead Card...", 'ai'); setTimeout(genCard, 1000); }
            }, 600);
        }

        function genCard() {
            document.getElementById('interface').style.display='none';
            document.getElementById('l_project').innerText = leadData.p;
            document.getElementById('l_scale').innerText = leadData.s;
            document.getElementById('l_name').innerText = leadData.n;
            document.getElementById('l_location').innerText = leadData.l;
            document.getElementById('l_phone').innerText = leadData.ph;
            document.getElementById('l_time').innerText = leadData.t;
            document.getElementById('pid').innerText = Math.floor(1000+Math.random()*9000);
            document.getElementById('finalCard').style.display='block';
        }

        function confirmLead() {
            document.getElementById('mainCard').classList.add('confirmed');
            document.getElementById('cardBtns').style.display='none';
            document.getElementById('dlBtn').style.display='block';
        }

        function downloadCard() {
            html2canvas(document.querySelector("#downloadArea")).then(c => {
                let l = document.createElement('a');
                l.download = 'VV-Lead-Card.png'; l.href = c.toDataURL(); l.click();
            });
        }

        function showLegal(t, b) {
            document.getElementById('otitle').innerText = t;
            document.getElementById('obody').innerText = b;
            document.getElementById('legalOverlay').style.display = 'flex';
        }

        function openContact() {
            document.getElementById('interface').style.display = 'none';
            document.getElementById('finalCard').style.display = 'none';
            document.getElementById('contactForm').style.display = 'flex';
        }
    </script>
</body>
</html>
