<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME PRO | MATCHING ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #c5a059; --white: #ffffff; --black: #000000; --navy: #001a33;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        /* EXACT BACKGROUND PHOTO FROM CONTRACTOR SITE */
        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 26, 51, 0.85), rgba(0, 26, 51, 0.95)), 
                        url('https://images.unsplash.com/photo-1541888946425-d81bb19480c5?q=80&w=2000');
            background-size: cover; background-position: center; z-index: -1;
        }

        /* HEADER BRANDING */
        .header-section { padding: 40px 60px; display: flex; align-items: center; gap: 20px; }
        .logo-box { width: 65px; height: 65px; background: #fff; border: 4px solid #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .logo-box img { width: 70%; }
        .logo-text { font-family: 'Montserrat'; font-size: 1.8rem; line-height: 0.85; text-transform: uppercase; color: #fff; letter-spacing: -1px; }

        /* MAIN LAYOUT */
        .main-layout { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; min-height: calc(100vh - 200px); }

        /* TAGLINE - MATCHING COLOR SCHEME & SIZE */
        .hero-tagline { text-align: center; margin-bottom: 50px; max-width: 1000px; }
        .hero-tagline h1 { 
            font-family: 'Montserrat'; font-size: 3.2rem; line-height: 1.1; 
            text-transform: uppercase; margin: 0; color: #fff; 
        }
        .hero-tagline span { color: var(--gold); } /* The yellow/$10,000+ accent */

        /* AI ENGINE - WHITE STADIUM BOX */
        .vv-engine-box {
            width: 100%; max-width: 600px; background: #fff;
            padding: 50px; border-radius: 80px; border: 10px solid #000;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }

        .chat-feed { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .msg { padding: 15px 22px; font-size: 0.95rem; font-weight: 700; border-radius: 25px; line-height: 1.4; }
        .ai-msg { background: #f1f3f5; color: #000; align-self: flex-start; border-bottom-left-radius: 4px; }
        .user-msg { background: var(--navy); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }

        .input-area { display: flex; gap: 10px; background: #f8f9fa; padding: 10px; border-radius: 50px; border: 2px solid #ddd; }
        input { flex: 1; background: transparent; border: none; padding: 10px 20px; font-weight: 700; outline: none; font-size: 1rem; }
        .send-btn { background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.3rem; font-weight: 900; }

        /* FINAL CARD - INDUSTRIAL THEME */
        #finalMatch { display: none; }
        .lead-card { background: #000; border-radius: 40px; padding: 35px; margin-bottom: 20px; }
        .lead-title { text-align: center; color: var(--gold); font-family: 'Montserrat'; font-size: 1rem; letter-spacing: 2px; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 25px; text-transform: uppercase; }
        .lead-row { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #1a1a1a; padding-bottom: 8px; font-size: 0.85rem; }
        .lead-row b { color: #fff; font-family: 'Montserrat'; text-transform: uppercase; font-size: 0.75rem; }
        .lead-row span { color: var(--gold); font-weight: 800; }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .action-btn { padding: 18px; border-radius: 50px; border: none; font-family: 'Montserrat'; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 0.8rem; }
        .edit-btn { background: #333; color: #fff; }
        .confirm-btn { background: var(--gold); color: #000; }
        .download-btn { width: 100%; margin-top: 15px; background: #fff; color: #000; }

        /* PILL FOOTER */
        .footer-nav { margin-top: 60px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding-bottom: 50px; }
        .footer-nav a { background: #fff; color: #000; text-decoration: none; padding: 12px 30px; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; border-radius: 50px; border: 2px solid #000; transition: 0.3s; }
        .footer-nav a:hover { background: var(--gold); }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="header-section">
        <div class="logo-box"><img src="vv-verified-badge.png" alt="VV"></div>
        <div class="logo-text">VV HOME<br>PRO</div>
    </div>

    <div class="main-layout">
        <div class="hero-tagline">
            <h1>STOP WASTING <span>$10,000+</span> ON SHODDY CONTRACTORS WHO GHOST YOU.</h1>
        </div>

        <div class="vv-engine-box">
            <div id="engineActive">
                <div class="chat-feed" id="chatStream">
                    <div class="msg ai-msg">Identify the project category you need help with (e.g. Roofing, HVAC, Windows).</div>
                </div>
                <div class="input-area">
                    <input type="text" id="userInput" placeholder="Type here..." onkeypress="handleKey(event)">
                    <button class="send-btn" onclick="process()">→</button>
                </div>
            </div>

            <div id="finalMatch">
                <div class="lead-card">
                    <div class="lead-title">Verified Lead Details</div>
                    <div class="lead-row"><b>Project:</b> <span id="out_issue"></span></div>
                    <div class="lead-row"><b>Scope:</b> <span id="out_scope"></span></div>
                    <div class="lead-row"><b>Owner:</b> <span id="out_name"></span></div>
                    <div class="lead-row"><b>Location:</b> <span id="out_market"></span></div>
                    <div class="lead-row"><b>Phone:</b> <span id="out_phone"></span></div>
                    <div class="lead-row"><b>Best Call:</b> <span id="out_time"></span></div>
                </div>
                <div class="action-grid">
                    <button class="action-btn edit-btn" onclick="resetEngine()">Edit</button>
                    <button class="action-btn confirm-btn" onclick="alert('Confirmed & Dispatched!')">Confirm</button>
                </div>
                <button class="action-btn download-btn" onclick="downloadLead()">Download Lead Summary</button>
            </div>
        </div>

        <div class="footer-nav">
            <a href="#">About Us</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Standards</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <script>
        let step = 1;
        let data = { issue: '', scope: '', name: '', market: '', phone: '', time: '' };
        function handleKey(e) { if(e.key === 'Enter') process(); }
        function addMsg(txt, type) {
            const stream = document.getElementById('chatStream');
            const b = document.createElement('div');
            b.className = `msg ${type}-msg`; b.innerText = txt;
            stream.appendChild(b); stream.scrollTop = stream.scrollHeight;
        }
        function process() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;
            addMsg(val, 'user'); input.value = '';
            setTimeout(() => {
                if(step === 1) { data.issue = val; addMsg("Is this a Major repair or Minor maintenance?", 'ai-msg'); step++; }
                else if(step === 2) { data.scope = val; addMsg("Full Name of the property owner:", 'ai-msg'); step++; }
                else if(step === 3) { data.name = val; addMsg("City and State of the property:", 'ai-msg'); step++; }
                else if(step === 4) { data.market = val; addMsg("Secure Phone Number:", 'ai-msg'); step++; }
                else if(step === 5) { data.phone = val; addMsg("What is the best time for our pros to call?", 'ai-msg'); step++; }
                else if(step === 6) { data.time = val; showFinal(); }
            }, 500);
        }
        function showFinal() {
            document.getElementById('engineActive').style.display = 'none';
            document.getElementById('out_issue').innerText = data.issue;
            document.getElementById('out_scope').innerText = data.scope;
            document.getElementById('out_name').innerText = data.name;
            document.getElementById('out_market').innerText = data.market;
            document.getElementById('out_phone').innerText = data.phone;
            document.getElementById('out_time').innerText = data.time;
            document.getElementById('finalMatch').style.display = 'block';
        }
        function resetEngine() {
            step = 1; document.getElementById('finalMatch').style.display = 'none';
            document.getElementById('engineActive').style.display = 'block';
            document.getElementById('chatStream').innerHTML = '<div class="msg ai-msg">Identify the project category you need help with.</div>';
        }
        function downloadLead() {
            const content = `Project: ${data.issue}\nScope: ${data.scope}\nName: ${data.name}\nLocation: ${data.market}\nPhone: ${data.phone}\nTime: ${data.time}`;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `Lead-${data.name}.txt`; a.click();
        }
    </script>
</body>
</html>
