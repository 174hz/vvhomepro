<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME PRO | DISPATCH</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy: #001a33; --neon: #39FF14; --white: #ffffff; --black: #000000; --gray: #1a1a1a;
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--navy); color: var(--white);
        }

        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 26, 51, 0.9), rgba(0, 26, 51, 0.95)), 
                        url('https://images.unsplash.com/photo-1541888946425-d81bb19480c5?q=80&w=2000');
            background-size: cover; z-index: -1;
        }

        .header-section { padding: 30px 60px; display: flex; align-items: center; gap: 15px; }
        .logo-box { width: 60px; height: 60px; background: #fff; display: flex; align-items: center; justify-content: center; border-radius: 12px; }
        .logo-box img { width: 70%; }
        .logo-text { font-family: 'Montserrat'; font-size: 1.5rem; line-height: 0.9; text-transform: uppercase; }

        .main-layout { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }

        .hero-tagline { text-align: center; margin-bottom: 40px; max-width: 900px; }
        .hero-tagline h1 { font-family: 'Montserrat'; font-size: 2.8rem; line-height: 1; text-transform: uppercase; margin: 0; }
        .hero-tagline span { color: var(--neon); }

        /* THE SHAPED ENGINE: MATCHING THE CONTRACTOR "INFRASTRUCTURE" BOX */
        .vv-engine-box {
            width: 100%; max-width: 580px;
            background: var(--black);
            padding: 40px;
            border-radius: 60px; /* This creates the specific "Infrastructure" box shape */
            border: 1px solid #333;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .chat-feed { height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; padding-right: 10px; }
        .msg { padding: 14px 20px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; border-radius: 20px; line-height: 1.4; }
        .ai-msg { background: #111; color: #fff; border: 1px solid #222; align-self: flex-start; border-bottom-left-radius: 4px; }
        .user-msg { background: var(--neon); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; }

        .input-area { display: flex; gap: 10px; background: #111; padding: 10px; border-radius: 40px; border: 1px solid #222; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px 15px; font-family: 'Plus Jakarta Sans'; font-weight: 700; outline: none; text-transform: uppercase; }
        .send-btn { background: var(--neon); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; font-weight: 900; }

        /* FINAL LEAD CARD */
        #finalMatch { display: none; }
        .lead-card { background: #0a0a0a; border: 1px solid #333; padding: 25px; border-radius: 30px; margin-bottom: 20px; }
        .lead-row { margin-bottom: 12px; font-size: 0.8rem; display: flex; justify-content: space-between; border-bottom: 1px solid #1a1a1a; padding-bottom: 8px; }
        .lead-row b { color: var(--neon); font-family: 'Montserrat'; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .action-btn { padding: 15px; border-radius: 30px; border: none; font-family: 'Montserrat'; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 0.75rem; }
        .edit-btn { background: #222; color: white; }
        .confirm-btn { background: var(--neon); color: black; }
        .download-btn { width: 100%; margin-top: 10px; background: white; color: black; }

        /* PILL FOOTER */
        .footer-nav { margin-top: 50px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .footer-nav a { background: #fff; color: #000; text-decoration: none; padding: 10px 25px; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; border-radius: 50px; }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="header-section">
        <div class="logo-box"><img src="vv-verified-badge.png" alt="VV"></div>
        <div class="logo-text">VV HOME<br>PRO</div>
    </div>

    <div class="main-layout">
        <div class="hero-tagline">
            <h1>STOP WASTING $10,000+ ON <span>SHODDY CONTRACTORS</span> WHO GHOST YOU.</h1>
        </div>

        <div class="vv-engine-box">
            <div id="engineActive">
                <div class="chat-feed" id="chatStream">
                    <div class="msg ai-msg">IDENTIFY PROJECT CATEGORY (E.G. ROOFING, HVAC).</div>
                </div>

                <div class="input-area">
                    <input type="text" id="userInput" placeholder="TYPE HERE..." onkeypress="handleKey(event)">
                    <button class="send-btn" onclick="process()">→</button>
                </div>
            </div>

            <div id="finalMatch">
                <div class="lead-card" id="leadCardContent">
                    <div style="text-align: center; margin-bottom: 20px; font-family: 'Montserrat'; font-size: 1rem; color: var(--neon);">VERIFIED PROJECT LEAD</div>
                    <div class="lead-row"><b>PROJECT:</b> <span id="out_issue"></span></div>
                    <div class="lead-row"><b>SCOPE:</b> <span id="out_scope"></span></div>
                    <div class="lead-row"><b>NAME:</b> <span id="out_name"></span></div>
                    <div class="lead-row"><b>MARKET:</b> <span id="out_market"></span></div>
                    <div class="lead-row"><b>PHONE:</b> <span id="out_phone"></span></div>
                </div>
                
                <div class="action-grid">
                    <button class="action-btn edit-btn" onclick="resetEngine()">Edit</button>
                    <button class="action-btn confirm-btn" onclick="alert('Confirmed & Dispatched!')">Confirm</button>
                </div>
                <button class="action-btn download-btn" onclick="downloadLead()">Download PDF Lead</button>
            </div>
        </div>

        <div class="footer-nav">
            <a href="#">About Us</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Standards</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <script>
        let step = 1;
        let data = { issue: '', scope: '', name: '', market: '', phone: '' };

        function handleKey(e) { if(e.key === 'Enter') process(); }

        function addMsg(txt, type) {
            const stream = document.getElementById('chatStream');
            const b = document.createElement('div');
            b.className = `msg ${type}-msg`;
            b.innerText = txt.toUpperCase();
            stream.appendChild(b);
            stream.scrollTop = stream.scrollHeight;
        }

        function process() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;
            addMsg(val, 'user');
            input.value = '';

            setTimeout(() => {
                if(step === 1) { data.issue = val; addMsg("SCOPE: MAJOR OR MINOR?", 'ai-msg'); step++; }
                else if(step === 2) { data.scope = val; addMsg("FULL NAME:", 'ai-msg'); step++; }
                else if(step === 3) { data.name = val; addMsg("CITY/STATE:", 'ai-msg'); step++; }
                else if(step === 4) { data.market = val; addMsg("PHONE NUMBER:", 'ai-msg'); step++; }
                else if(step === 5) { data.phone = val; showFinal(); }
            }, 500);
        }

        function showFinal() {
            document.getElementById('engineActive').style.display = 'none';
            document.getElementById('out_issue').innerText = data.issue;
            document.getElementById('out_scope').innerText = data.scope;
            document.getElementById('out_name').innerText = data.name;
            document.getElementById('out_market').innerText = data.market;
            document.getElementById('out_phone').innerText = data.phone;
            document.getElementById('finalMatch').style.display = 'block';
        }

        function resetEngine() {
            step = 1;
            document.getElementById('finalMatch').style.display = 'none';
            document.getElementById('engineActive').style.display = 'block';
            document.getElementById('chatStream').innerHTML = '<div class="msg ai-msg">IDENTIFY PROJECT CATEGORY (E.G. ROOFING, HVAC).</div>';
        }

        function downloadLead() {
            const content = `
                VV HOME PRO VERIFIED LEAD
                -------------------------
                Project: ${data.issue}
                Scope: ${data.scope}
                Name: ${data.name}
                Market: ${data.market}
                Phone: ${data.phone}
            `;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `VV-Lead-${data.name}.txt`;
            a.click();
        }
    </script>
</body>
</html>
