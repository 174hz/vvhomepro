<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --yellow: #FFFF00; /* THE EXACT SAFETY YELLOW FROM SITE */
            --white: #ffffff; 
            --black: #000000; 
            --navy-overlay: rgba(0, 12, 26, 0.7); /* Reduced overlay for more photo visibility */
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        /* THE EXACT BACKDROP PHOTO WITH HIGH VISIBILITY */
        .site-wrapper {
            position: relative; width: 100%; min-height: 100vh;
            background: linear-gradient(var(--navy-overlay), var(--navy-overlay)), 
                        url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=2000');
            background-size: cover; background-position: center; background-attachment: fixed;
            background-blend-mode: luminosity; /* Enhances structural details of the photo */
            display: flex; flex-direction: column; align-items: center;
        }

        /* HEADER BRANDING */
        .header { width: 100%; padding: 40px 60px; display: flex; align-items: center; gap: 20px; }
        .logo-box { width: 65px; height: 65px; background: #fff; border: 4px solid #000; border-radius: 12px; }
        .logo-text { font-family: 'Montserrat'; font-size: 1.8rem; line-height: 0.85; text-transform: uppercase; color: #fff; letter-spacing: -1px; }

        .main-layout { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; min-height: 80vh; }

        /* TAGLINE: EXACT FONT SIZES & YELLOW COLOR WEIGHT */
        .hero-tagline { text-align: center; margin-bottom: 50px; max-width: 1100px; }
        .hero-tagline h1 { 
            font-family: 'Montserrat'; font-size: 3.5rem; line-height: 1.1; 
            text-transform: uppercase; margin: 0; color: #fff; 
        }
        .hero-tagline span { color: var(--yellow); } /* "$10,000+" in Yellow */

        /* THE INFRASTRUCTURE BOX CLONE (NOW AI ENGINE) */
        .infrastructure-box {
            width: 100%; max-width: 700px;
            background: var(--black);
            border: 10px solid var(--black); /* The precise industrial frame shape */
            display: flex; flex-direction: column;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.7);
        }

        .infra-header {
            padding: 15px 0; border-bottom: 4px solid #1a1a1a;
            display: flex; justify-content: space-between; align-items: center;
        }
        .infra-header h2 { 
            margin: 0; font-family: 'Montserrat'; font-size: 1.2rem; 
            color: var(--white); text-transform: uppercase; letter-spacing: 2px;
        }
        
        /* AI CHAT FEED */
        .chat-feed {
            height: 380px; overflow-y: auto; padding: 25px 0;
            background: var(--black); display: flex; flex-direction: column; gap: 20px;
        }
        .msg { padding: 20px; font-size: 1rem; font-weight: 800; line-height: 1.3; }
        .ai-msg { background: #0a0a0a; color: var(--white); border: 2px solid #222; width: 95%; }
        .user-msg { align-self: flex-end; background: var(--yellow); color: var(--black); width: 95%; font-weight: 900; }

        /* INPUT BLOCK */
        .input-block { display: flex; margin-top: 10px; border-top: 4px solid #1a1a1a; padding-top: 20px; }
        input { 
            flex: 1; border: 3px solid #333; background: #050505; color: white; padding: 20px; 
            font-size: 1.1rem; font-weight: 700; font-family: 'Plus Jakarta Sans'; outline: none;
        }
        .send-trigger { background: var(--yellow); color: var(--black); border: none; padding: 0 35px; font-size: 1.8rem; cursor: pointer; }

        /* RESULT VIEW */
        #finalResult { display: none; padding: 20px 0; }
        .data-card { background: #050505; border-left: 10px solid var(--yellow); padding: 30px; }
        .data-row { margin-bottom: 15px; font-size: 1rem; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; color: #888; display: flex; justify-content: space-between; }
        .data-row b { color: #fff; text-transform: uppercase; font-family: 'Montserrat'; font-size: 0.75rem; }
        .data-row span { color: var(--yellow); font-weight: 900; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .action-btn { padding: 20px; font-family: 'Montserrat'; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; font-size: 0.9rem; }
        .btn-edit { background: #222; color: white; }
        .btn-confirm { background: var(--yellow); color: black; }
        .btn-dl { width: 100%; margin-top: 10px; background: white; color: black; }

        /* FOOTER NAVIGATION */
        .footer { margin-top: 80px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding-bottom: 60px; }
        .pill { background: #fff; color: #000; text-decoration: none; padding: 12px 30px; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; border-radius: 50px; border: 2px solid #000; transition: 0.2s; }
        .pill:hover { background: var(--yellow); }
    </style>
</head>
<body>

    <div class="site-wrapper">
        <div class="header">
            <div class="logo-box"></div>
            <div class="logo-text">VV HOME<br>PRO</div>
        </div>

        <div class="main-layout">
            <div class="hero-tagline">
                <h1>STOP WASTING <span>$10,000+</span> ON SHODDY CONTRACTORS WHO GHOST YOU.</h1>
            </div>

            <div class="infrastructure-box">
                <div id="engineActive">
                    <div class="infra-header">
                        <h2>THE VV ENGINE</h2>
                        <div style="font-size: 0.7rem; color: #444; font-weight: 900;">STATUS: CONNECTED</div>
                    </div>

                    <div class="chat-feed" id="chatStream">
                        <div class="msg ai-msg">What project category do you need help with? (e.g. Roofing, HVAC, Windows)</div>
                    </div>

                    <div class="input-block">
                        <input type="text" id="userInput" placeholder="TYPE YOUR PROJECT..." onkeypress="handleKey(event)">
                        <button class="send-trigger" onclick="process()">→</button>
                    </div>
                </div>

                <div id="finalResult">
                    <div class="data-card">
                        <div class="data-row"><b>Project</b> <span id="out_issue"></span></div>
                        <div class="data-row"><b>Scope</b> <span id="out_scope"></span></div>
                        <div class="data-row"><b>Owner</b> <span id="out_name"></span></div>
                        <div class="data-row"><b>Location</b> <span id="out_market"></span></div>
                        <div class="data-row"><b>Phone</b> <span id="out_phone"></span></div>
                        <div class="data-row"><b>Best Call</b> <span id="out_time"></span></div>
                    </div>
                    <div class="action-btns">
                        <button class="action-btn btn-edit" onclick="resetEngine()">Edit Lead</button>
                        <button class="action-btn btn-confirm" onclick="alert('DISPATCHED TO VV INFRASTRUCTURE')">Confirm Dispatch</button>
                    </div>
                    <button class="action-btn btn-dl" onclick="downloadLead()">Download Summary</button>
                </div>
            </div>

            <div class="footer">
                <a href="#" class="pill">About Us</a>
                <a href="#" class="pill">Privacy</a>
                <a href="#" class="pill">Terms</a>
                <a href="#" class="pill">Standards</a>
                <a href="#" class="pill">Contact</a>
            </div>
        </div>
    </div>

    <script>
        let step = 1;
        let data = { issue: '', scope: '', name: '', market: '', phone: '', time: '' };
        function handleKey(e) { if(e.key === 'Enter') process(); }
        function addMsg(txt, type) {
            const stream = document.getElementById('chatStream');
            const b = document.createElement('div');
            b.className = `msg ${type}-msg`; b.innerText = txt;
            stream.appendChild(b); stream.scrollTop = stream.scrollHeight;
        }
        function process() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;
            addMsg(val, 'user'); input.value = '';
            setTimeout(() => {
                if(step === 1) { data.issue = val; addMsg("Is this a Major repair or Minor maintenance?", 'ai-msg'); step++; }
                else if(step === 2) { data.scope = val; addMsg("Full Name of the property owner:", 'ai-msg'); step++; }
                else if(step === 3) { data.name = val; addMsg("City and State for the project:", 'ai-msg'); step++; }
                else if(step === 4) { data.market = val; addMsg("Your secure Phone Number:", 'ai-msg'); step++; }
                else if(step === 5) { data.phone = val; addMsg("What is the best time for our pros to call?", 'ai-msg'); step++; }
                else if(step === 6) { data.time = val; showFinal(); }
            }, 500);
        }
        function showFinal() {
            document.getElementById('engineActive').style.display = 'none';
            document.getElementById('out_issue').innerText = data.issue;
            document.getElementById('out_scope').innerText = data.scope;
            document.getElementById('out_name').innerText = data.name;
            document.getElementById('out_market').innerText = data.market;
            document.getElementById('out_phone').innerText = data.phone;
            document.getElementById('out_time').innerText = data.time;
            document.getElementById('finalResult').style.display = 'block';
        }
        function resetEngine() {
            step = 1; document.getElementById('finalResult').style.display = 'none';
            document.getElementById('engineActive').style.display = 'block';
            document.getElementById('chatStream').innerHTML = '<div class="msg ai-msg">What project category do you need help with?</div>';
        }
        function downloadLead() {
            const content = `Project: ${data.issue}\nScope: ${data.scope}\nName: ${data.name}\nLocation: ${data.market}\nPhone: ${data.phone}\nTime: ${data.time}`;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `VV-Lead.txt`; a.click();
        }
    </script>
</body>
</html>
