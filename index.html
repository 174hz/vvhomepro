<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME PRO | MATCHING ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy: #001a33; --gold: #c5a059; --neon: #39FF14; --white: #ffffff; --black: #000000;
        }

        /* 1:1 TYPOGRAPHY & LAYOUT RESET */
        * { box-sizing: border-box; border-radius: 0 !important; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--navy); color: var(--white);
        }

        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 26, 51, 0.7), rgba(0, 26, 51, 0.9)), 
                        url('https://images.unsplash.com/photo-1541888946425-d81bb19480c5?q=80&w=2000');
            background-size: cover; background-position: center; z-index: -1;
        }

        /* TOP BRANDING (SCREENSHOT TOP-LEFT) */
        .header-section {
            padding: 40px; display: flex; align-items: center; gap: 20px;
        }
        .logo-box {
            width: 90px; height: 90px; background: #fff;
            border: 8px solid var(--black); display: flex; align-items: center; justify-content: center;
            box-shadow: 6px 6px 0px var(--black);
        }
        .logo-box img { width: 80%; height: auto; }
        .logo-text {
            font-family: 'Montserrat'; font-size: 2.5rem; line-height: 0.85;
            text-transform: uppercase; letter-spacing: -2px; text-shadow: 5px 5px 0px var(--black);
        }

        /* MAIN CENTERED ENGINE AREA */
        .main-layout {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; min-height: calc(100vh - 180px);
        }

        /* THE TAGLINE (IDENTICAL FONT SIZE & WEIGHT) */
        .hero-tagline {
            text-align: center; margin-bottom: 50px; max-width: 1200px;
        }
        .hero-tagline h1 {
            font-family: 'Montserrat'; font-size: 3.8rem; line-height: 0.9;
            text-transform: uppercase; margin: 0; text-shadow: 8px 8px 0px var(--black);
        }
        .hero-tagline span { color: var(--neon); }

        /* THE AI ENGINE BOX (RED HIGHLIGHTED AREA FROM SCREENSHOT) */
        .engine-container {
            width: 100%; max-width: 700px;
            background: var(--white);
            border: 15px solid var(--black);
            box-shadow: 35px 35px 0px var(--gold);
            display: flex; flex-direction: column;
        }

        .engine-header {
            background: var(--black); color: var(--neon); padding: 25px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 12px solid var(--gold);
        }
        .engine-header h2 { margin: 0; font-family: 'Montserrat'; font-size: 1.4rem; letter-spacing: 2px; }
        
        .btn-reset {
            background: var(--gold); color: #000; border: 4px solid #000;
            padding: 8px 18px; font-family: 'Montserrat'; font-weight: 900;
            text-transform: uppercase; cursor: pointer; font-size: 0.8rem;
        }

        /* CHAT FEED */
        .chat-feed {
            height: 400px; overflow-y: auto; padding: 35px;
            background: #e2e8f0; display: flex; flex-direction: column; gap: 25px;
        }
        .msg { 
            padding: 22px; font-size: 1.2rem; font-weight: 800; 
            border: 6px solid var(--black); text-transform: uppercase; line-height: 1.1;
        }
        .ai-msg { background: #fff; color: #000; box-shadow: 10px 10px 0px var(--gold); width: 85%; }
        .user-msg { align-self: flex-end; background: #000; color: var(--neon); box-shadow: -10px 10px 0px var(--gold); width: 85%; }

        /* INPUT BAR */
        .input-tray { 
            padding: 30px; display: flex; gap: 15px; background: #fff; border-top: 10px solid var(--black);
        }
        input { 
            flex: 1; border: 8px solid var(--black); padding: 22px; 
            font-size: 1.4rem; font-weight: 800; font-family: 'Plus Jakarta Sans';
            text-transform: uppercase; outline: none;
        }
        .btn-send { background: #000; color: var(--neon); border: none; width: 90px; font-size: 2.5rem; cursor: pointer; }

        /* FINAL CARD - MODELED AFTER LEAD DISPLAY */
        #finalMatch { display: none; padding: 40px; background: #fff; }
        .summary-box { background: #000; color: #fff; padding: 35px; border: 12px solid var(--neon); }
        .summary-line { margin-bottom: 15px; font-size: 1.2rem; border-bottom: 2px solid #333; padding-bottom: 10px; font-weight: 800; }
        .summary-line b { color: var(--gold); font-family: 'Montserrat'; }
        .btn-confirm {
            width: 100%; background: var(--neon); color: #000; padding: 30px;
            font-family: 'Montserrat'; font-weight: 900; font-size: 2rem;
            border: 8px solid var(--black); margin-top: 25px; cursor: pointer; text-transform: uppercase;
        }

        /* FOOTER LINKS (BLOCK STYLE) */
        .footer-nav {
            margin-top: 80px; display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding-bottom: 60px;
        }
        .footer-nav a {
            background: #000; color: #fff; text-decoration: none; padding: 18px 35px;
            font-family: 'Montserrat'; font-weight: 900; font-size: 1rem; border: 6px solid var(--gold);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="header-section">
        <div class="logo-box"><img src="vv-verified-badge.png" alt="VV"></div>
        <div class="logo-text">VV HOME<br>PRO</div>
    </div>

    <div class="main-layout">
        <div class="hero-tagline">
            <h1>STOP LOSING YOUR SANITY TO <span>SLOW, UNVERIFIED</span> CONTRACTORS.</h1>
        </div>

        <div class="engine-container">
            <div class="engine-header">
                <h2>AI MATCHING ENGINE</h2>
                <button class="btn-reset" onclick="location.reload()">Refresh</button>
            </div>

            <div class="chat-feed" id="chatStream">
                <div class="msg ai-msg">IDENTIFY PROJECT CATEGORY (E.G. ROOFING, HVAC, WINDOWS) TO COMMENCE MATCHING.</div>
            </div>

            <div class="input-tray" id="inputBar">
                <input type="text" id="userInput" placeholder="TYPE HERE..." onkeypress="handleKey(event)">
                <button class="btn-send" onclick="process()">→</button>
            </div>

            <div id="finalMatch">
                <div class="summary-box">
                    <div class="summary-line"><b>PROJECT:</b> <span id="out_issue"></span></div>
                    <div class="summary-line"><b>NAME:</b> <span id="out_name"></span></div>
                    <div class="summary-line"><b>LOCATION:</b> <span id="out_market"></span></div>
                    <div class="summary-line"><b>CONTACT:</b> <span id="out_phone"></span></div>
                </div>
                <button class="btn-confirm" onclick="alert('DISPATCHED')">Dispatch Match</button>
            </div>
        </div>

        <div class="footer-nav">
            <a href="about.html">About Us</a>
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
            <a href="standards.html">Standards</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>

    <script>
        let step = 1; let data = { issue: '', name: '', market: '', phone: '' };
        function handleKey(e) { if(e.key === 'Enter') process(); }
        function addMsg(txt, type) {
            const stream = document.getElementById('chatStream');
            const b = document.createElement('div');
            b.className = `msg ${type}-msg`;
            b.innerText = txt.toUpperCase();
            stream.appendChild(b);
            stream.scrollTop = stream.scrollHeight;
        }
        function process() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;
            addMsg(val, 'user');
            input.value = '';
            setTimeout(() => {
                if(step === 1) { data.issue = val; addMsg("FULL NAME OF PROPERTY OWNER:", 'ai-msg'); step++; }
                else if(step === 2) { data.name = val; addMsg("CITY AND STATE/PROVINCE:", 'ai-msg'); step++; }
                else if(step === 3) { data.market = val; addMsg("SECURE CONTACT PHONE NUMBER:", 'ai-msg'); step++; }
                else if(step === 4) { data.phone = val; addMsg("VERIFY DATA BELOW.", 'ai-msg'); showFinal(); }
            }, 600);
        }
        function showFinal() {
            document.getElementById('inputBar').style.display = 'none';
            document.getElementById('out_name').innerText = data.name;
            document.getElementById('out_issue').innerText = data.issue;
            document.getElementById('out_market').innerText = data.market;
            document.getElementById('out_phone').innerText = data.phone;
            document.getElementById('finalMatch').style.display = 'block';
        }
    </script>
</body>
</html>
