<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME | AI-Powered Pro Matching</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy: #001a33; 
            --gold: #c5a059; 
            --neon: #39FF14; 
            /* Lightened transparency for maximum video visibility */
            --glass: rgba(255, 255, 255, 0.15); 
            --card-bg: rgba(255, 255, 255, 0.85);
        }
        
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f4f4; color: #000; overflow-x: hidden; }

        /* VIDEO BACKGROUND - HIGH VISIBILITY */
        .video-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: #fff;
        }
        .video-wrapper video {
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(85%) contrast(100%); /* Much lighter for better visibility */
        }
        /* Scrim is now very light and subtle */
        .video-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.4) 100%);
        }

        .hero-content {
            min-height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 80px 5%; position: relative;
        }

        h1 { 
            font-family: 'Montserrat'; font-size: clamp(2.5rem, 8vw, 5.5rem); 
            text-transform: uppercase; letter-spacing: -3px; line-height: 0.9; margin: 0; 
            color: var(--navy);
            text-shadow: 0 4px 10px rgba(255,255,255,0.5);
        }
        h1 span { color: var(--gold); }

        /* AI MATCHING ENGINE UI */
        .engine-container {
            margin-top: 40px; 
            background: var(--card-bg); /* Opaque white for readability on light BG */
            backdrop-filter: blur(10px); 
            padding: 40px; border-radius: 40px; width: 100%; max-width: 600px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            position: relative; overflow: hidden;
            border: 2px solid var(--navy);
        }

        /* Scan Line Animation (Neon Green) */
        .engine-container::after {
            content: ''; position: absolute; top: -100%; left: 0; width: 100%; height: 5px;
            background: var(--neon);
            box-shadow: 0 0 15px var(--neon);
            animation: scan 3s infinite linear; pointer-events: none;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        .engine-header { color: var(--navy); font-family: 'Montserrat'; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; font-weight: 900; }

        .btn-main {
            display: block; width: 100%; padding: 22px; background: var(--navy);
            color: #fff; text-decoration: none; font-family: 'Montserrat';
            font-weight: 900; font-size: 1.3rem; border-radius: 15px;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,26,51,0.3); }

        /* LEGAL BUBBLES */
        .legal-bubbles { display: flex; justify-content: center; gap: 12px; margin-top: 50px; flex-wrap: wrap; }
        .bubble { 
            padding: 10px 20px; border-radius: 50px; background: var(--navy); 
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase; 
            color: #fff; cursor: pointer; border: 1px solid var(--navy); transition: 0.3s; 
        }
        .bubble:hover { background: var(--gold); border-color: var(--gold); }

        /* MODAL SYSTEM */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(10px); padding: 20px; }
        .modal-content { background: #fff; border: 4px solid var(--navy); padding: 40px; border-radius: 30px; max-width: 750px; width: 100%; max-height: 80vh; overflow-y: auto; position: relative; text-align: left; color: #000; }
        .close-modal { position: absolute; top: 20px; right: 20px; color: var(--navy); font-size: 2.5rem; cursor: pointer; font-weight: 900; }
        .modal h2 { font-family: 'Montserrat'; color: var(--navy); text-transform: uppercase; }
        
        .pro-link { margin-top: 40px; color: var(--navy); text-decoration: none; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; border-bottom: 2px solid var(--gold); }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline poster="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&q=80&w=2070">
            <source src="https://player.vimeo.com/external/459389137.sd.mp4?s=910243615456b9432608c0f56a02f306d87e07a3&profile_id=164&oauth2_token_id=57447761" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <section class="hero-content">
        <h1>Vetted. Verified. <span>Matched.</span></h1>
        
        <div class="engine-container">
            <div class="engine-header">AI Matching Infrastructure Active</div>
            <p style="font-weight: 800; margin-bottom: 30px; font-size: 1.1rem; color: #333;">The fastest way to secure an elite local pro for Roofing, HVAC, or Windows.</p>
            <a href="why-choose-vv-pro.html" class="btn-main">Launch AI Engine</a>
        </div>

        <div class="legal-bubbles">
            <div class="bubble" onclick="openModal('privacy')">Privacy Policy</div>
            <div class="bubble" onclick="openModal('terms')">Consumer Terms</div>
            <div class="bubble" onclick="openModal('standards')">Vetting Standards</div>
        </div>
        
        <a href="pro.html" class="pro-link">Contractor Entrance: Join the Registry</a>
    </section>

    <div id="modal-overlay" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modal-text"></div>
        </div>
    </div>

    <script>
        const modalData = {
            privacy: "<h2>Data Integrity</h2><p>Your project details are secured via 256-bit encryption. We only share your data with the one verified professional matched to your specific task.</p>",
            terms: "<h2>Consumer Agreement</h2><p>VV HOME PRO provides a free matching service for homeowners. By launching the engine, you agree to be contacted by one elite-tier professional in your region.</p>",
            standards: "<h2>Vetting Infrastructure</h2><ul><li><strong>Active Audit:</strong> Real-time verification of state trade licenses.</li><li><strong>Insurance Lock:</strong> Proof of $1M+ GL insurance required for registry standing.</li><li><strong>Response Mandate:</strong> Pro must respond to AI-dispatched leads within 60 minutes.</li></ul>"
        };

        function openModal(type) {
            document.getElementById('modal-text').innerHTML = modalData[type];
            document.getElementById('modal-overlay').style.display = 'flex';
        }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    </script>
</body>
</html>
