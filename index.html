<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME PRO | MATCHING ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy: #001a33; --gold: #c5a059; --neon: #39FF14; --white: #ffffff; --black: #000000;
        }

        * { box-sizing: border-box; border-radius: 0 !important; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--navy); color: var(--white);
        }

        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 26, 51, 0.8), rgba(0, 26, 51, 0.95)), 
                        url('https://images.unsplash.com/photo-1541888946425-d81bb19480c5?q=80&w=2000');
            background-size: cover; background-position: center; z-index: -1;
        }

        /* HEADER BRANDING */
        .header-section { padding: 30px 50px; display: flex; align-items: center; gap: 15px; }
        .logo-box {
            width: 65px; height: 65px; background: #fff;
            border: 5px solid var(--black); display: flex; align-items: center; justify-content: center;
            box-shadow: 4px 4px 0px var(--black);
        }
        .logo-box img { width: 70%; height: auto; }
        .logo-text {
            font-family: 'Montserrat'; font-size: 1.6rem; line-height: 0.9;
            text-transform: uppercase; letter-spacing: -1px; text-shadow: 3px 3px 0px var(--black);
        }

        /* MAIN LAYOUT */
        .main-layout {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; min-height: calc(100vh - 220px);
        }

        /* TAGLINE - HERO SIZE */
        .hero-tagline { text-align: center; margin-bottom: 35px; max-width: 900px; }
        .hero-tagline h1 {
            font-family: 'Montserrat'; font-size: 2.8rem; line-height: 1;
            text-transform: uppercase; margin: 0; text-shadow: 5px 5px 0px var(--black);
        }
        .hero-tagline span { color: var(--neon); }

        /* AI ENGINE - PROPORTIONED */
        .engine-container {
            width: 100%; max-width: 520px; /* Slimmer container */
            background: var(--white);
            border: 8px solid var(--black);
            box-shadow: 20px 20px 0px var(--gold);
            display: flex; flex-direction: column;
        }

        .engine-header {
            background: var(--black); color: var(--neon); padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 6px solid var(--gold);
        }
        .engine-header h2 { margin: 0; font-family: 'Montserrat'; font-size: 0.9rem; letter-spacing: 1px; }
        
        .btn-reset {
            background: var(--gold); color: #000; border: 2px solid #000;
            padding: 4px 10px; font-family: 'Montserrat'; font-weight: 900;
            text-transform: uppercase; cursor: pointer; font-size: 0.65rem;
        }

        /* CHAT FEED - REDUCED FONT SIZE */
        .chat-feed {
            height: 300px; overflow-y: auto; padding: 20px;
            background: #f1f5f9; display: flex; flex-direction: column; gap: 15px;
        }
        .msg { 
            padding: 12px 16px; font-size: 0.85rem; font-weight: 800; 
            border: 3px solid var(--black); text-transform: uppercase; line-height: 1.2;
        }
        .ai-msg { background: #fff; color: #000; box-shadow: 4px 4px 0px var(--gold); width: 80%; }
        .user-msg { align-self: flex-end; background: #000; color: var(--neon); box-shadow: -4px 4px 0px var(--gold); width: 80%; }

        /* INPUT BAR */
        .input-tray { 
            padding: 15px; display: flex; gap: 10px; background: #fff; border-top: 6px solid var(--black);
        }
        input { 
            flex: 1; border: 4px solid var(--black); padding: 12px; 
            font-size: 0.9rem; font-weight: 800; font-family: 'Plus Jakarta Sans';
            text-transform: uppercase; outline: none;
        }
        .btn-send { 
            background: #000; color: var(--neon); border: none; width: 50px; 
            font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; 
        }

        /* FOOTER NAV - SMALLER & CLEANER */
        .footer-nav {
            margin-top: 50px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding-bottom: 40px;
        }
        .footer-nav a {
            background: #000; color: #fff; text-decoration: none; padding: 10px 20px;
            font-family: 'Montserrat'; font-weight: 900; font-size: 0.75rem; border: 3px solid var(--gold);
            text-transform: uppercase; transition: 0.15s;
        }
        .footer-nav a:hover { transform: translateY(-2px); box-shadow: 0 4px 0 var(--gold); }

        /* FINAL MATCH VIEW */
        #finalMatch { display: none; padding: 25px; background: #fff; }
        .summary-box { background: #000; color: #fff; padding: 20px; border: 6px solid var(--neon); }
        .summary-line { margin-bottom: 10px; font-size: 0.85rem; border-bottom: 1px solid #333; padding-bottom: 6px; font-weight: 800; }
        .summary-line b { color: var(--gold); font-family: 'Montserrat'; font-size: 0.75rem; margin-right: 5px; }
        .btn-confirm {
            width: 100%; background: var(--neon); color: #000; padding: 15px;
            font-family: 'Montserrat'; font-weight: 900; font-size: 1.1rem;
            border: 4px solid var(--black); margin-top: 15px; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="header-section">
        <div class="logo-box"><img src="vv-verified-badge.png" alt="VV"></div>
        <div class="logo-text">VV HOME<br>PRO</div>
    </div>

    <div class="main-layout">
        <div class="hero-tagline">
            <h1>STOP WASTING $10,000+ ON <span>SHODDY CONTRACTORS</span> WHO GHOST YOU.</h1>
        </div>

        <div class="engine-container">
            <div class="engine-header">
                <h2>AI MATCHING ENGINE</h2>
                <button class="btn-reset" onclick="location.reload()">Refresh</button>
            </div>

            <div class="chat-feed" id="chatStream">
                <div class="msg ai-msg">IDENTIFY PROJECT CATEGORY (E.G. ROOFING, HVAC, WINDOWS) TO COMMENCE MATCHING.</div>
            </div>

            <div class="input-tray" id="inputBar">
                <input type="text" id="userInput" placeholder="TYPE PROJECT..." onkeypress="handleKey(event)">
                <button class="btn-send" onclick="process()">→</button>
            </div>

            <div id="finalMatch">
                <div class="summary-box">
                    <div class="summary-line"><b>PROJECT:</b> <span id="out_issue"></span></div>
                    <div class="summary-line"><b>NAME:</b> <span id="out_name"></span></div>
                    <div class="summary-line"><b>MARKET:</b> <span id="out_market"></span></div>
                    <div class="summary-line"><b>PHONE:</b> <span id="out_phone"></span></div>
                </div>
                <button class="btn-confirm" onclick="alert('MATCH DISPATCHED')">Confirm Match</button>
            </div>
        </div>

        <div class="footer-nav">
            <a href="about.html">About Us</a>
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
            <a href="standards.html">Standards</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>

    <script>
        let step = 1; let data = { issue: '', name: '', market: '', phone: '' };
        function handleKey(e) { if(e.key === 'Enter') process(); }
        function addMsg(txt, type) {
            const stream = document.getElementById('chatStream');
            const b = document.createElement('div');
            b.className = `msg ${type}-msg`;
            b.innerText = txt.toUpperCase();
            stream.appendChild(b);
            stream.scrollTop = stream.scrollHeight;
        }
        function process() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;
            addMsg(val, 'user');
            input.value = '';
            setTimeout(() => {
                if(step === 1) { data.issue = val; addMsg("FULL NAME OF PROPERTY OWNER:", 'ai-msg'); step++; }
                else if(step === 2) { data.name = val; addMsg("CITY AND STATE/PROVINCE:", 'ai-msg'); step++; }
                else if(step === 3) { data.market = val; addMsg("SECURE CONTACT PHONE NUMBER:", 'ai-msg'); step++; }
                else if(step === 4) { data.phone = val; addMsg("PROTOCOL COMPLETE. VERIFY DATA.", 'ai-msg'); showFinal(); }
            }, 500);
        }
        function showFinal() {
            document.getElementById('inputBar').style.display = 'none';
            document.getElementById('out_name').innerText = data.name;
            document.getElementById('out_issue').innerText = data.issue;
            document.getElementById('out_market').innerText = data.market;
            document.getElementById('out_phone').innerText = data.phone;
            document.getElementById('finalMatch').style.display = 'block';
        }
    </script>
</body>
</html>
