<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME | AI Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #001a33; --gold: #c5a059; --neon: #39FF14; --glass: rgba(255, 255, 255, 0.98); }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f4f4; color: #000; overflow: hidden; }

        .video-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .video-wrapper video { min-width: 100%; min-height: 100%; width: auto; height: auto; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); object-fit: cover; }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.2); }

        .hero-content { min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .engine-container {
            background: var(--glass); padding: 40px; border-radius: 30px; 
            width: 100%; max-width: 500px; border: 3px solid var(--navy);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); position: relative;
        }

        .step { display: none; }
        .step.active { display: block; }

        .ai-label { font-size: 1.1rem; font-weight: 800; color: var(--navy); margin-bottom: 15px; display: block; }
        input, select { width: 100%; border-radius: 10px; border: 2px solid #ddd; padding: 18px; font-family: inherit; font-size: 1rem; font-weight: 700; margin-bottom: 20px; outline: none; }
        
        .btn-next { width: 100%; padding: 20px; background: var(--navy); color: white; border: none; font-family: 'Montserrat'; font-weight: 900; border-radius: 10px; text-transform: uppercase; cursor: pointer; font-size: 1rem; }
        .btn-next:hover { background: var(--gold); }

        /* LEAD CARD */
        .lead-card { background: var(--navy); color: white; padding: 25px; border-radius: 15px; border: 1px solid var(--neon); font-family: monospace; }
        .lead-header { color: var(--neon); border-bottom: 1px solid rgba(57,255,20,0.3); padding-bottom: 10px; margin-bottom: 15px; font-size: 0.9rem; }
        .line { margin-bottom: 8px; font-size: 0.9rem; }
        .line span { color: var(--gold); }
        
        .card-btns { display: flex; gap: 10px; margin-top: 20px; }
        .edit-btn { flex: 1; background: none; border: 1px solid white; color: white; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; }
        .lock-btn { flex: 2; background: var(--neon); color: black; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: 900; font-size: 0.85rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline><source src="https://player.vimeo.com/external/459389137.sd.mp4?s=910243615456b9432608c0f56a02f306d87e07a3&profile_id=164&oauth2_token_id=57447761" type="video/mp4"></video>
        <div class="video-overlay"></div>
    </div>

    <div class="hero-content">
        <div class="engine-container">
            <div class="step active" id="s1">
                <span class="ai-label">What is the project?</span>
                <input type="text" id="p_problem" placeholder="e.g. leaky roof">
                <button class="btn-next" onclick="go(2)">Next</button>
            </div>
            <div class="step" id="s2">
                <span class="ai-label">Your Name:</span>
                <input type="text" id="p_name" placeholder="Frank Jones">
                <button class="btn-next" onclick="go(3)">Next</button>
            </div>
            <div class="step" id="s3">
                <span class="ai-label">Your City:</span>
                <input type="text" id="p_city" placeholder="Boston, MA">
                <button class="btn-next" onclick="go(4)">Next</button>
            </div>
            <div class="step" id="s4">
                <span class="ai-label">Phone Number:</span>
                <input type="tel" id="p_phone" placeholder="232-345-0967">
                <button class="btn-next" onclick="go(5)">Next</button>
            </div>
            <div class="step" id="s5">
                <span class="ai-label">Is this a major or minor leak?</span>
                <select id="p_scope"><option>Minor Repair</option><option>Major Leak</option></select>
                <button class="btn-next" onclick="go(6)">Next</button>
            </div>
            <div class="step" id="s6">
                <span class="ai-label">Best time for a call?</span>
                <input type="text" id="p_time" placeholder="any time after 10 am daily">
                <button class="btn-next" onclick="renderCard()">Build Lead Card</button>
            </div>
            <div class="step" id="s7">
                <div class="lead-card">
                    <div class="lead-header">LEAD ID: #795917</div>
                    <div class="line">NAME: <span id="out_n"></span></div>
                    <div class="line">PROJECT: <span id="out_p"></span></div>
                    <div class="line">CITY: <span id="out_c"></span></div>
                    <div class="line">PHONE: <span id="out_ph"></span></div>
                    <div class="line">TIME: <span id="out_t"></span></div>
                    <div class="card-btns">
                        <button class="edit-btn" onclick="go(1)">Edit Info</button>
                        <button class="lock-btn" onclick="send()">Confirm & Lock In</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function go(n){ document.querySelectorAll('.step').forEach(s=>s.classList.remove('active')); document.getElementById('s'+n).classList.add('active'); }
        function renderCard(){
            document.getElementById('out_n').innerText = document.getElementById('p_name').value;
            document.getElementById('out_p').innerText = document.getElementById('p_problem').value + " (" + document.getElementById('p_scope').value + ")";
            document.getElementById('out_c').innerText = document.getElementById('p_city').value;
            document.getElementById('out_ph').innerText = document.getElementById('p_phone').value;
            document.getElementById('out_t').innerText = document.getElementById('p_time').value;
            go(7);
        }
        async function send(){
            const btn = document.querySelector('.lock-btn'); btn.innerText = "SENDING...";
            const payload = { 
                name: document.getElementById('p_name').value, 
                problem: document.getElementById('p_problem').value, 
                city: document.getElementById('p_city').value, 
                phone: document.getElementById('p_phone').value, 
                scope: document.getElementById('p_scope').value, 
                time: document.getElementById('p_time').value 
            };
            try {
                await fetch('https://vvhomepro-brain.dbelnavis.workers.dev/', { method: 'POST', body: JSON.stringify(payload) });
                alert("Lead #795917 Confirmed."); location.reload();
            } catch(e){ console.log(e); }
        }
    </script>
</body>
</html>
