<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME PRO | DISPATCH</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <style>
        /* BRUTALIST OVERRIDE */
        :root { --navy: #001a33; --gold: #c5a059; --neon: #39FF14; --black: #000000; --white: #ffffff; }
        * { box-sizing: border-box !important; border-radius: 0 !important; }
        
        body { 
            margin: 0; padding: 0; background-color: var(--navy) !important; 
            font-family: 'Montserrat', sans-serif !important; overflow-x: hidden;
        }

        /* THE BACKGROUND IMAGE */
        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 26, 51, 0.8), rgba(0, 26, 51, 0.95)), 
                        url('https://images.unsplash.com/photo-1503387762-592dea58ef21?q=80&w=2000');
            background-size: cover; background-position: center; z-index: -1;
        }

        /* BRANDING: TOP LEFT - RIGID & PROTECTED */
        .brand-block {
            position: absolute; top: 40px; left: 40px; display: flex; align-items: center; gap: 20px; z-index: 9999;
        }
        .logo-box { 
            width: 100px !important; height: 100px !important; background: white !important;
            border: 10px solid var(--black) !important; display: flex; align-items: center; justify-content: center;
        }
        .logo-box img { width: 80% !important; height: auto !important; }
        .brand-text { 
            font-size: 3rem !important; line-height: 0.8 !important; color: white !important;
            text-transform: uppercase !important; letter-spacing: -3px !important;
            text-shadow: 8px 8px 0px var(--black) !important;
        }

        /* MAIN CONTENT AREA */
        .layout-center {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding: 180px 20px 100px 20px;
        }

        /* THE TAGLINE: IDENTICAL ENERGY TO CONTRACTOR SITE */
        .cta-tagline {
            text-align: center; margin-bottom: 60px; max-width: 1200px;
        }
        .cta-tagline h1 {
            color: white !important; font-size: 4rem !important; line-height: 0.9 !important; margin: 0;
            text-transform: uppercase !important; text-shadow: 12px 12px 0px var(--black) !important;
        }
        .cta-tagline span { color: var(--neon) !important; }

        /* THE AI ENGINE: 15px BORDER INDUSTRIAL BOX */
        .engine-container {
            width: 100% !important; max-width: 750px !important;
            background: var(--white) !important;
            border: 15px solid var(--black) !important;
            box-shadow: 40px 40px 0px var(--gold) !important;
            display: flex; flex-direction: column;
        }

        .engine-header {
            background: var(--black) !important; color: var(--neon) !important; padding: 25px !important;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 15px solid var(--gold) !important;
        }
        .engine-header h3 { margin: 0 !important; font-size: 1.8rem !important; letter-spacing: 2px !important; }
        .refresh-btn { 
            background: var(--gold) !important; color: black !important; border: 5px solid black !important;
            padding: 10px 20px !important; font-weight: 900 !important; cursor: pointer; text-transform: uppercase;
        }

        .chat-stream {
            height: 400px !important; overflow-y: auto; padding: 40px !important;
            background: #cbd5e1 !important; display: flex; flex-direction: column; gap: 30px;
        }

        /* CHAT BUBBLES: HEAVY INDUSTRIAL */
        .msg { 
            padding: 25px !important; font-size: 1.4rem !important; font-weight: 900 !important; 
            border: 10px solid var(--black) !important; text-transform: uppercase !important; line-height: 1;
        }
        .ai { background: white !important; color: black !important; box-shadow: 12px 12px 0px var(--gold) !important; width: 85%; }
        .user { align-self: flex-end; background: black !important; color: var(--neon) !important; box-shadow: -12px 12px 0px var(--gold) !important; width: 85%; }

        /* INPUT BAR */
        .input-tray { 
            padding: 30px !important; display: flex; gap: 20px; 
            background: white !important; border-top: 15px solid var(--black) !important;
        }
        input { 
            flex: 1 !important; border: 10px solid var(--black) !important; padding: 25px !important; 
            font-size: 1.6rem !important; font-weight: 900 !important; font-family: 'Montserrat' !important;
            text-transform: uppercase !important; outline: none;
        }
        .send-btn { background: var(--black) !important; color: var(--neon) !important; width: 100px !important; font-size: 3rem !important; border: none; cursor: pointer; }

        /* FINAL CARD */
        #finalResult { display: none; padding: 40px !important; background: white !important; }
        .data-card { background: black !important; color: white !important; padding: 40px !important; border: 15px solid var(--neon) !important; }
        .data-row { font-size: 1.4rem !important; margin-bottom: 15px !important; border-bottom: 4px solid #333 !important; padding-bottom: 10px; font-weight: 900; }
        .data-row b { color: var(--gold) !important; }
        .dispatch-btn {
            width: 100% !important; padding: 35px !important; background: var(--neon) !important; 
            color: black !important; font-size: 2.5rem !important; font-weight: 900 !important;
            border: 10px solid var(--black) !important; margin-top: 25px !important; cursor: pointer; text-transform: uppercase;
        }

        /* FOOTER: BLOCK BARS */
        .footer-nav { margin-top: 100px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .footer-nav a { 
            background: black !important; color: white !important; text-decoration: none !important;
            padding: 20px 40px !important; border: 8px solid var(--gold) !important;
            font-size: 1.2rem !important; font-weight: 900 !important; text-transform: uppercase !important;
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="brand-block">
        <div class="logo-box">
            <img src="vv-verified-badge.png" alt="VV">
        </div>
        <div class="brand-text">VV HOME<br>PRO</div>
    </div>

    <div class="layout-center">
        <div class="cta-tagline">
            <h1>STOP WASTING $10,000+ ON <span>UNVERIFIED CONTRACTORS</span> WHO GHOST YOU.</h1>
        </div>

        <div class="engine-container">
            <div class="engine-header">
                <h3>AI MATCHING ENGINE</h3>
                <button class="refresh-btn" onclick="location.reload()">Refresh</button>
            </div>

            <div class="chat-stream" id="chatStream">
                <div class="msg ai">SYSTEM ONLINE. ENTER PROJECT TYPE (ROOFING, HVAC, WINDOWS) TO START.</div>
            </div>

            <div class="input-tray" id="inputBar">
                <input type="text" id="userInput" placeholder="TYPE HERE..." onkeypress="handleKey(event)">
                <button class="send-btn" onclick="process()">→</button>
            </div>

            <div id="finalResult">
                <div class="data-card">
                    <div class="data-row"><b>PROJECT:</b> <span id="out_issue"></span></div>
                    <div class="data-row"><b>OWNER:</b> <span id="out_name"></span></div>
                    <div class="data-row"><b>MARKET:</b> <span id="out_market"></span></div>
                    <div class="data-row"><b>PHONE:</b> <span id="out_phone"></span></div>
                </div>
                <button class="dispatch-btn" onclick="alert('DISPATCHED')">Dispatch Match</button>
            </div>
        </div>

        <div class="footer-nav">
            <a href="about.html">About Us</a>
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
            <a href="standards.html">Standards</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>

    <script>
        let step = 1; let data = { issue: '', name: '', market: '', phone: '' };
        function handleKey(e) { if(e.key === 'Enter') process(); }
        function addMsg(txt, type) {
            const stream = document.getElementById('chatStream');
            const b = document.createElement('div');
            b.className = `msg ${type}`;
            b.innerText = txt.toUpperCase();
            stream.appendChild(b);
            stream.scrollTop = stream.scrollHeight;
        }
        function process() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;
            addMsg(val, 'user');
            input.value = '';
            setTimeout(() => {
                if(step === 1) { data.issue = val; addMsg("ENTER FULL NAME:", 'ai'); step++; }
                else if(step === 2) { data.name = val; addMsg("ENTER CITY/STATE:", 'ai'); step++; }
                else if(step === 3) { data.market = val; addMsg("ENTER PHONE NUMBER:", 'ai'); step++; }
                else if(step === 4) { data.phone = val; addMsg("VERIFY DATA BELOW.", 'ai'); showFinal(); }
            }, 500);
        }
        function showFinal() {
            document.getElementById('inputBar').style.display = 'none';
            document.getElementById('out_name').innerText = data.name;
            document.getElementById('out_issue').innerText = data.issue;
            document.getElementById('out_market').innerText = data.market;
            document.getElementById('out_phone').innerText = data.phone;
            document.getElementById('finalResult').style.display = 'block';
        }
    </script>
</body>
</html>
