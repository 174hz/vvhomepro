<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME | Messenger Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --navy: #001a33; --gold: #c5a059; --neon: #39FF14; --bg: #0a0a0a; --ai-bubble: #e9e9eb; --user-bubble: #007aff; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }

        /* MESSENGER WINDOW */
        .messenger-card {
            background: #fff; width: 100%; max-width: 500px; height: 700px; 
            border-radius: 30px; border: 3px solid var(--navy); display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .header { background: var(--navy); color: white; padding: 20px; text-align: center; font-family: 'Montserrat'; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

        .chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }

        /* BUBBLES */
        .bubble { max-width: 80%; padding: 14px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .ai { align-self: flex-start; background: var(--ai-bubble); color: #000; border-bottom-left-radius: 5px; font-weight: 500; }
        .user { align-self: flex-end; background: var(--user-bubble); color: #fff; border-bottom-right-radius: 5px; font-weight: 700; text-align: right; }

        /* INPUT AREA */
        .input-box { padding: 20px; border-top: 1px solid #eee; background: #fafafa; display: flex; gap: 10px; }
        input, select { flex: 1; border: 2px solid #ddd; padding: 12px 15px; border-radius: 25px; outline: none; font-family: inherit; font-weight: 600; }
        .send-btn { background: var(--navy); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 900; }

        /* LEAD CARD */
        #finalOutput { display: none; padding: 20px; }
        #leadCardCapture { background: var(--navy); color: white; padding: 25px; border-radius: 20px; border: 2px solid var(--neon); font-family: monospace; position: relative; }
        .card-row { margin-bottom: 8px; font-size: 0.85rem; }
        .card-row span { color: var(--gold); }
        .actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn { padding: 15px; border-radius: 10px; cursor: pointer; border: none; font-weight: 900; text-transform: uppercase; font-size: 0.8rem; flex: 1; }
        .btn-confirm { background: var(--neon); color: black; }
        .btn-edit { background: transparent; border: 1px solid white; color: white; }
        .btn-download { background: var(--gold); color: white; display: none; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="messenger-card">
        <div class="header">Project Engine</div>
        
        <div class="chat-area" id="chatArea">
            <div class="bubble ai">Hello. What is the project issue you're dealing with today?</div>
        </div>

        <div class="input-box" id="inputContainer">
            <input type="text" id="userInput" placeholder="Type your message..." onkeypress="handleKey(event)">
            <button class="send-btn" onclick="processInput()">↑</button>
        </div>

        <div id="scopeSelectWrapper" style="display:none; padding: 10px 20px;">
            <select id="scopeInput">
                <option value="Minor Repair">Minor Repair</option>
                <option value="Major Job">Major Job</option>
            </select>
            <button class="btn-confirm" onclick="processInput(true)" style="margin-top:5px; width:100%;">Set Scope</button>
        </div>

        <div id="finalOutput">
            <div id="leadCardCapture">
                <div style="color:var(--neon); margin-bottom:10px; font-size:0.7rem;">ID: #795917 | VV HOME PRO</div>
                <div class="card-row">NAME: <span id="out_name"></span></div>
                <div class="card-row">ISSUE: <span id="out_issue"></span></div>
                <div class="card-row">MARKET: <span id="out_market"></span></div>
                <div class="card-row">PHONE: <span id="out_phone"></span></div>
                <div class="card-row">TIME: <span id="out_time"></span></div>
            </div>
            <div class="actions" id="verifyButtons">
                <button class="btn btn-edit" onclick="location.reload()">Restart</button>
                <button class="btn btn-confirm" onclick="dispatch()">Confirm & Lock</button>
            </div>
            <button class="btn btn-download" id="dlBtn" onclick="downloadPNG()">Download Lead PNG</button>
        </div>
    </div>

    <script>
        let step = 1;
        let data = { issue: '', name: '', market: '', phone: '', scope: '', time: '' };

        function handleKey(e) { if(e.key === 'Enter') processInput(); }

        function addBubble(text, type) {
            const area = document.getElementById('chatArea');
            const b = document.createElement('div');
            b.className = `bubble ${type}`;
            b.innerText = text;
            area.appendChild(b);
            area.scrollTop = area.scrollHeight;
        }

        function processInput(isScope = false) {
            const input = document.getElementById('userInput');
            const val = isScope ? document.getElementById('scopeInput').value : input.value;
            if(!val && !isScope) return;

            addBubble(val, 'user');
            if(!isScope) input.value = '';

            setTimeout(() => {
                if(step === 1) {
                    data.issue = val;
                    addBubble("Got it. And what is your full name?", 'ai');
                    step++;
                } else if(step === 2) {
                    data.name = val;
                    addBubble("Which city/region? (MA, NJ, or Ontario)", 'ai');
                    step++;
                } else if(step === 3) {
                    data.market = val.toUpperCase();
                    addBubble("What is the best phone number to reach you?", 'ai');
                    step++;
                } else if(step === 4) {
                    data.phone = val;
                    addBubble("What is the scope of this job?", 'ai');
                    document.getElementById('inputContainer').style.display = 'none';
                    document.getElementById('scopeSelectWrapper').style.display = 'block';
                    step++;
                } else if(step === 5) {
                    data.scope = val;
                    document.getElementById('scopeSelectWrapper').style.display = 'none';
                    document.getElementById('inputContainer').style.display = 'flex';
                    addBubble("Finally, what is the best time to call you?", 'ai');
                    step++;
                } else if(step === 6) {
                    data.time = val;
                    addBubble("Generating your Lead Card now...", 'ai');
                    showFinal();
                }
            }, 600);
        }

        function showFinal() {
            document.getElementById('inputContainer').style.display = 'none';
            document.getElementById('out_name').innerText = data.name;
            document.getElementById('out_issue').innerText = data.issue + " (" + data.scope + ")";
            document.getElementById('out_market').innerText = data.market;
            document.getElementById('out_phone').innerText = data.phone;
            document.getElementById('out_time').innerText = data.time;
            document.getElementById('finalOutput').style.display = 'block';
            document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
        }

        async function dispatch() {
            document.querySelector('.btn-confirm').innerText = "LOCKING...";
            try {
                await fetch('https://vvhomepro-brain.dbelnavis.workers.dev/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                document.getElementById('verifyButtons').style.display = 'none';
                document.getElementById('dlBtn').style.display = 'block';
            } catch(e) { console.error(e); }
        }

        function downloadPNG() {
            html2canvas(document.getElementById('leadCardCapture'), { backgroundColor: '#001a33' }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Lead_Card.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
