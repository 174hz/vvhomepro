<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME PRO | AI Matching Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #39FF14; --gold: #FFD700; --dark: #050505; 
            --glass: rgba(15, 15, 15, 0.75); --border: rgba(255, 255, 255, 0.15);
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: white; overflow-x: hidden; }

        /* VIDEO BACKDROP */
        .video-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
        .video-wrapper video { min-width: 100%; min-height: 100%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); object-fit: cover; filter: brightness(45%) contrast(105%); }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7)); }

        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 60px 5%; }
        h1 { font-family: 'Montserrat'; font-size: clamp(2.2rem, 7vw, 4.2rem); text-transform: uppercase; letter-spacing: -3px; margin: 0; line-height: 0.95; }
        .money { color: var(--gold); text-decoration: underline; }

        /* ENGINE BOX */
        .engine-container { max-width: 750px; width: 100%; margin: 40px auto; padding: 40px; background: var(--glass); border-radius: 40px; text-align: left; border: 1px solid var(--border); backdrop-filter: blur(15px); }
        .engine-header { color: var(--neon); font-family: 'Montserrat'; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 25px; letter-spacing: 2px; display: flex; justify-content: space-between; align-items: center; }
        
        /* REFRESH BUTTON */
        .refresh-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: white; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-family: 'Montserrat'; transition: 0.3s; }
        .refresh-btn:hover { background: var(--gold); color: black; }

        .chat-feed { height: 320px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; margin-bottom: 25px; }
        .msg { padding: 18px; border-radius: 18px; font-weight: 700; font-size: 0.95rem; max-width: 85%; }
        .ai-msg { background: rgba(255,255,255,0.05); border: 1px solid var(--border); align-self: flex-start; }
        .user-msg { background: var(--gold); color: black; align-self: flex-end; }

        .input-row { display: flex; gap: 12px; }
        input { flex: 1; height: 65px; border-radius: 15px; border: none; padding: 0 20px; font-weight: 800; font-size: 1rem; }
        .send-btn { width: 70px; background: var(--neon); border: none; border-radius: 15px; cursor: pointer; font-size: 1.5rem; }

        /* LEAD CARD */
        #finalCard { display: none; }
        .lead-card { background: rgba(255,255,255,0.05); border-left: 4px solid var(--gold); padding: 25px; border-radius: 15px; margin-bottom: 20px; }
        .lead-line { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 10px 0; font-size: 0.85rem; }
        .lead-line b { color: var(--gold); text-transform: uppercase; font-family: 'Montserrat'; font-size: 0.7rem; }
        
        .card-btns { display: flex; gap: 10px; }
        .card-btn { flex: 1; padding: 18px; border-radius: 12px; border: none; font-family: 'Montserrat'; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .confirm-btn { background: var(--neon); color: black; }
        .edit-btn { background: #333; color: white; }

        .legal-bubbles { display: flex; justify-content: center; gap: 10px; margin-top: 30px; flex-wrap: wrap; }
        .bubble { padding: 12px 20px; border-radius: 50px; background: rgba(255,255,255,0.1); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: white; cursor: pointer; border: 1px solid var(--border); text-decoration: none; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline><source src="https://player.vimeo.com/external/434045526.sd.mp4?s=c3a233367a02203e4291888a71f0084f7e6f8090&profile_id=164" type="video/mp4"></video>
        <div class="video-overlay"></div>
    </div>

    <section class="hero">
        <h1>STOP WASTING <span class="money">$10,000+</span> ON SHODDY <br>CONTRACTORS WHO GHOST YOU.</h1>

        <div class="engine-container">
            <div id="interface">
                <div class="engine-header">
                    <span>AI Powered Vetted & Verified Matching Engine</span>
                    <button class="refresh-btn" onclick="location.reload()">REFRESH ↻</button>
                </div>
                <div class="chat-feed" id="chatFeed">
                    <div class="msg ai-msg">Simply tell us about your project (e.g., roofing, HVAC, Windows)</div>
                </div>
                <div class="input-row">
                    <input type="text" id="userIn" placeholder="Type here..." onkeypress="if(event.key==='Enter') process()">
                    <button class="send-btn" id="sendBtn" onclick="process()">→</button>
                </div>
            </div>

            <div id="finalCard">
                <div class="engine-header"><span style="color:var(--gold)">Verified Project Lead Card</span></div>
                <div class="lead-card">
                    <div class="lead-line"><b>Project:</b> <span id="l_project"></span></div>
                    <div class="lead-line"><b>Scale:</b> <span id="l_scale"></span></div>
                    <div class="lead-line"><b>Owner:</b> <span id="l_name"></span></div>
                    <div class="lead-line"><b>Market:</b> <span id="l_location"></span></div>
                    <div class="lead-line"><b>Contact:</b> <span id="l_phone"></span></div>
                    <div class="lead-line"><b>Call Window:</b> <span id="l_time"></span></div>
                </div>
                <div class="card-btns">
                    <button class="card-btn edit-btn" onclick="location.reload()">Edit Info</button>
                    <button class="card-btn confirm-btn" onclick="alert('Lead Dispatched to Regional Infrastructure.')">Confirm Match</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        const CLOUDFLARE_URL = "https://vvhomepro-brain.dbelnavis.workers.dev/";
        let chatHistory = [];
        let leadData = { project: '', scale: '', name: '', location: '', phone: '', time: '' };

        function addMsg(txt, type) {
            const feed = document.getElementById('chatFeed');
            const div = document.createElement('div');
            div.className = `msg ${type}-msg`;
            div.innerText = txt;
            feed.appendChild(div);
            feed.scrollTop = feed.scrollHeight;
        }

        async function process() {
            const input = document.getElementById('userIn');
            const message = input.value.trim();
            if(!message) return;

            addMsg(message, 'user');
            input.value = "";

            try {
                const response = await fetch(CLOUDFLARE_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: message, history: chatHistory })
                });

                const data = await response.json();
                const aiText = data.text || data.response;
                addMsg(aiText, 'ai-msg');

                // TRACK DATA LOCALLY FOR THE CARD
                const step = chatHistory.length / 2;
                if (step === 0) leadData.project = message;
                if (step === 1) leadData.scale = message;
                if (step === 2) leadData.name = message;
                if (step === 3) leadData.location = message;
                if (step === 4) leadData.phone = message;
                if (step === 5) leadData.time = message;

                chatHistory.push({ role: "user", content: message });
                chatHistory.push({ role: "assistant", content: aiText });

                // SHOW CARD AFTER ALL 6 DATA POINTS GATHERED
                if (chatHistory.length >= 12) {
                    setTimeout(showLeadCard, 1000);
                }

            } catch (err) {
                addMsg("Infrastructure connection error. Hit Refresh.", 'ai-msg');
            }
        }

        function showLeadCard() {
            document.getElementById('interface').style.display = 'none';
            document.getElementById('l_project').innerText = leadData.project;
            document.getElementById('l_scale').innerText = leadData.scale;
            document.getElementById('l_name').innerText = leadData.name;
            document.getElementById('l_location').innerText = leadData.location;
            document.getElementById('l_phone').innerText = leadData.phone;
            document.getElementById('l_time').innerText = leadData.time;
            document.getElementById('finalCard').style.display = 'block';
        }
    </script>
</body>
</html>
