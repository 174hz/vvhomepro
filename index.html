<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME | AI Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #001a33; --gold: #c5a059; --neon: #39FF14; --glass: rgba(255, 255, 255, 0.98); }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f4f4; color: #000; overflow: hidden; }

        .video-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .video-wrapper video { min-width: 100%; min-height: 100%; width: auto; height: auto; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); object-fit: cover; filter: brightness(95%); }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.2); }

        .hero-content { min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .engine-container {
            background: var(--glass); padding: 40px; border-radius: 35px; 
            width: 100%; max-width: 500px; border: 3px solid var(--navy);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .step { display: none; }
        .step.active { display: block; }

        .ai-q { font-size: 1.2rem; font-weight: 800; color: var(--navy); margin-bottom: 20px; line-height: 1.4; }
        input, select { width: 100%; border-radius: 12px; border: 2.5px solid #ddd; padding: 20px; font-family: inherit; font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; outline: none; background: #fff; }

        .btn-next { width: 100%; padding: 20px; background: var(--navy); color: white; border: none; font-family: 'Montserrat'; font-weight: 900; border-radius: 12px; text-transform: uppercase; cursor: pointer; font-size: 1.1rem; }
        .btn-next:hover { background: var(--gold); }

        /* LEAD CARD */
        .lead-card { background: var(--navy); color: white; padding: 30px; border-radius: 20px; border: 1.5px solid var(--neon); font-family: monospace; }
        .lead-id { color: var(--neon); border-bottom: 1px solid rgba(57,255,20,0.3); padding-bottom: 10px; margin-bottom: 15px; font-size: 0.9rem; }
        .l-line { margin-bottom: 10px; font-size: 0.95rem; }
        .l-line span { color: var(--gold); }
        
        .card-btns { display: flex; gap: 10px; margin-top: 25px; }
        .btn-edit { flex: 1; background: transparent; border: 1px solid white; color: white; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 0.8rem; }
        .btn-lock { flex: 2; background: var(--neon); color: black; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 900; text-transform: uppercase; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline><source src="https://player.vimeo.com/external/459389137.sd.mp4?s=910243615456b9432608c0f56a02f306d87e07a3&profile_id=164&oauth2_token_id=57447761" type="video/mp4"></video>
        <div class="video-overlay"></div>
    </div>

    <div class="hero-content">
        <div class="engine-container">
            <div class="step active" id="s1">
                <div class="ai-q">State your issue (e.g. leaky roof, HVAC problem):</div>
                <input type="text" id="val_problem" placeholder="i have a leaky roof">
                <button class="btn-next" onclick="move(2)">Next</button>
            </div>
            <div class="step" id="s2">
                <div class="ai-q">What is your name?</div>
                <input type="text" id="val_name" placeholder="Frank Jones">
                <button class="btn-next" onclick="move(3)">Next</button>
            </div>
            <div class="step" id="s3">
                <div class="ai-q">What is your city?</div>
                <input type="text" id="val_city" placeholder="Boston, MA">
                <button class="btn-next" onclick="move(4)">Next</button>
            </div>
            <div class="step" id="s4">
                <div class="ai-q">What is your phone number?</div>
                <input type="tel" id="val_phone" placeholder="232-345-0967">
                <button class="btn-next" onclick="move(5)">Next</button>
            </div>
            <div class="step" id="s5">
                <div class="ai-q">Scope of job:</div>
                <select id="val_scope"><option>Minor Repair</option><option>Major Job</option></select>
                <button class="btn-next" onclick="move(6)">Next</button>
            </div>
            <div class="step" id="s6">
                <div class="ai-q">Best time to call?</div>
                <input type="text" id="val_time" placeholder="any time after 10 am daily">
                <button class="btn-next" onclick="render()">Generate Lead Card</button>
            </div>
            <div class="step" id="s7">
                <div class="lead-card">
                    <div class="lead-id">LEAD ID: #795917</div>
                    <div class="l-line">NAME: <span id="out_n"></span></div>
                    <div class="l-line">ISSUE: <span id="out_i"></span></div>
                    <div class="l-line">CITY: <span id="out_c"></span></div>
                    <div class="l-line">PHONE: <span id="out_p"></span></div>
                    <div class="l-line">TIME: <span id="out_t"></span></div>
                    <div class="card-btns">
                        <button class="btn-edit" onclick="move(1)">Edit</button>
                        <button class="btn-lock" onclick="push()">Confirm & Lock In</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function move(n){ document.querySelectorAll('.step').forEach(s=>s.classList.remove('active')); document.getElementById('s'+n).classList.add('active'); }
        function render(){
            document.getElementById('out_n').innerText = document.getElementById('val_name').value;
            document.getElementById('out_i').innerText = document.getElementById('val_problem').value + " (" + document.getElementById('val_scope').value + ")";
            document.getElementById('out_c').innerText = document.getElementById('val_city').value;
            document.getElementById('out_p').innerText = document.getElementById('val_phone').value;
            document.getElementById('out_t').innerText = document.getElementById('val_time').value;
            move(7);
        }
        async function push(){
            const btn = document.querySelector('.btn-lock'); btn.innerText = "SENDING...";
            const payload = { 
                name: document.getElementById('val_name').value, 
                problem: document.getElementById('val_problem').value, 
                city: document.getElementById('val_city').value, 
                phone: document.getElementById('val_phone').value, 
                scope: document.getElementById('val_scope').value, 
                time: document.getElementById('val_time').value 
            };
            try {
                await fetch('https://vvhomepro-brain.dbelnavis.workers.dev/', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload) 
                });
                alert("Lead #795917 Confirmed."); location.reload();
            } catch(e){ console.log(e); }
        }
    </script>
</body>
</html>
