<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV HOME PRO | Dispatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #39FF14; --gold: #FFD700; --dark: #050505; 
            --glass: rgba(15, 15, 15, 0.85); --border: rgba(255, 255, 255, 0.15);
        }
        
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: white; overflow-x: hidden; }

        /* VIDEO CLONE */
        .video-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
        .video-wrapper video { min-width: 100%; min-height: 100%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); object-fit: cover; filter: brightness(45%) contrast(105%); }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.6)); }

        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 60px 5%; }
        h1 { font-family: 'Montserrat'; font-size: clamp(2.2rem, 8vw, 4.5rem); text-transform: uppercase; letter-spacing: -3px; line-height: 0.9; }
        .money { color: var(--gold); text-decoration: underline; }

        /* ENGINE BOX */
        .engine-container { max-width: 800px; width: 100%; background: var(--glass); border-radius: 30px; border: 1px solid var(--border); backdrop-filter: blur(12px); padding: 40px; margin: 40px 0; text-align: left; }
        .chat-feed { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .msg { padding: 15px; border-radius: 12px; font-weight: 700; font-size: 0.9rem; }
        .ai-msg { background: rgba(255,255,255,0.05); border: 1px solid var(--border); align-self: flex-start; }
        .user-msg { background: var(--gold); color: black; align-self: flex-end; }

        .input-row { display: flex; gap: 10px; }
        input { flex: 1; height: 65px; border-radius: 12px; border: none; padding: 0 20px; font-weight: 800; }
        .send-btn { width: 80px; background: var(--neon); border: none; border-radius: 12px; cursor: pointer; font-size: 1.5rem; font-weight: 900; }

        /* LEGAL MODAL STYLING */
        .modal { 
            display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); 
        }
        .modal-content { 
            background: var(--dark); border: 1px solid var(--border); 
            width: 90%; max-width: 700px; margin: 10% auto; padding: 40px; border-radius: 30px; 
            max-height: 70vh; overflow-y: auto;
        }
        .modal-header { font-family: 'Montserrat'; color: var(--neon); text-transform: uppercase; margin-bottom: 20px; font-size: 1.5rem; }
        .close-modal { float: right; cursor: pointer; color: var(--gold); font-weight: 900; font-size: 1.2rem; }

        .legal-bubbles { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .bubble { padding: 12px 25px; border-radius: 50px; background: rgba(255,255,255,0.1); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: white; cursor: pointer; border: 1px solid var(--border); }
        .bubble:hover { background: var(--gold); color: black; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline><source src="https://player.vimeo.com/external/434045526.sd.mp4?s=c3a233367a02203e4291888a71f0084f7e6f8090&profile_id=164" type="video/mp4"></video>
        <div class="video-overlay"></div>
    </div>

    <section class="hero">
        <h1>STOP WASTING <span class="money">$10,000+</span> ON SHODDY <br>CONTRACTORS WHO GHOST YOU.</h1>

        <div class="engine-container">
            <div class="chat-feed" id="chatFeed">
                <div class="msg ai-msg">What project category do you need help with?</div>
            </div>
            <div class="input-row">
                <input type="text" id="userIn" placeholder="Type here..." onkeypress="if(event.key==='Enter') process()">
                <button class="send-btn" onclick="process()">→</button>
            </div>
        </div>

        <div class="legal-bubbles">
            <div class="bubble" onclick="openModal('about')">About Us</div>
            <div class="bubble" onclick="openModal('standards')">Operating Standards</div>
            <div class="bubble" onclick="openModal('privacy')">Privacy</div>
            <div class="bubble" onclick="openModal('terms')">Terms</div>
            <div class="bubble" onclick="openModal('contact')">Contact</div>
        </div>
    </section>

    <div id="legalModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">CLOSE X</span>
            <div id="modalTitle" class="modal-header"></div>
            <div id="modalBody" style="opacity: 0.9; line-height: 1.6;"></div>
        </div>
    </div>

    <script>
        const content = {
            about: { title: "About Us", body: "VV HOME PRO is the digital infrastructure for elite home services. We eliminate the 'ghosting' epidemic by connecting high-intent homeowners with verified regional monopolies in under 30 seconds." },
            standards: { title: "Operating Standards", body: "1. 30-Second Dispatch Guarantee.<br>2. One Pro per Trade per Region.<br>3. Full Lead Card Verification.<br>4. Mandatory 90% First-Call response rate for all Infrastructure partners." },
            privacy: { title: "Privacy Policy", body: "Your data is encrypted and never sold to third-party lead aggregators. Your information is dispatched exclusively to the ONE verified professional in your region." },
            terms: { title: "Terms of Service", body: "By using the VV Engine, you agree that we are a dispatch facilitator. Service contracts are held directly between the homeowner and the activated professional." },
            contact: { title: "Contact", body: "Support: support@vvhomepro.com<br>Infrastructure HQ: [Your Address/Link Here]<br>Response Time: < 2 Hours." }
        };

        function openModal(id) {
            document.getElementById('modalTitle').innerText = content[id].title;
            document.getElementById('modalBody').innerHTML = content[id].body;
            document.getElementById('legalModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('legalModal').style.display = 'none'; }

        // Close if clicking outside the box
        window.onclick = function(event) {
            if (event.target == document.getElementById('legalModal')) closeModal();
        }

        // Basic Chat logic (Placeholder)
        function process() {
            const input = document.getElementById('userIn');
            if(!input.value) return;
            document.getElementById('chatFeed').innerHTML += `<div class="msg user-msg">${input.value}</div>`;
            input.value = "";
        }
    </script>
</body>
</html>
